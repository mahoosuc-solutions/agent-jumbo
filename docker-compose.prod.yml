services:
  agent-jumbo:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        INSTALL_PLAYWRIGHT: 1
        RUN_PRELOAD: 1
        INSTALL_ADDITIONAL_TOOLS: 1
        INSTALL_MERMAID_CLI: ${INSTALL_MERMAID_CLI:-0}
    image: agent-jumbo:production
    pull_policy: never
    container_name: agent-jumbo-production
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
      - path: .env.production
        required: false   # gitignored runtime overrides (MOS bridge, auth, etc.)
    environment:
      AGENT_JUMBO_RUN_MODE: ${AGENT_JUMBO_RUN_MODE:-production}
      AGENT_JUMBO_LAPTOP_MODE: ${AGENT_JUMBO_LAPTOP_MODE:-false}
      AGENTMESH_REDIS_URL: ${AGENTMESH_REDIS_URL:-}
      AIOS_BASE_URL: ${AIOS_BASE_URL:-}
      LITELLM_LOCAL_MODEL_COST_MAP: "True"
      WEB_UI_PORT: 80
      WEB_UI_HOST: 0.0.0.0
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      FILE_OWNER_UID: ${FILE_OWNER_UID:-1000}
      FILE_OWNER_GID: ${FILE_OWNER_GID:-1000}
      AGENT_JUMBO_SCHEDULER_SEED_PATH: ${AGENT_JUMBO_SCHEDULER_SEED_PATH:-/mnt/wdblack/dev/projects/agent-jumbo/tmp/scheduler/tasks.json}
    ports:
      - "6274:80"
    volumes:
      # Persistent data volumes (keep existing)
      - agent_jumbo_data:/aj/data
      - agent_jumbo_logs:/aj/logs
      - agent_jumbo_venv:/opt/venv-a0
      # Local data drive mounts
      - /mnt/wdblack:/mnt/wdblack:rw
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.config:/root/.config:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ── West Bethel Motel MCP Edge (staging) ────────────────────────────────
  wbm-mcp-staging:
    image: ${MCP_EDGE_IMAGE:-ghcr.io/webemo-aaron/west-bethel-motel-booking-system/mcp-edge}:${MCP_EDGE_TAG:-latest}
    container_name: wbm-mcp-staging
    restart: unless-stopped
    env_file:
      - path: /mnt/wdblack/dev/projects/west-bethel-motel-booking-system/mcp-edge/.env
        required: true
    ports:
      - "3150:3150"
    volumes:
      - wbm_mcp_staging_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3150/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── West Bethel Motel MCP Edge (production) ──────────────────────────────
  wbm-mcp-production:
    image: ${MCP_EDGE_IMAGE:-ghcr.io/webemo-aaron/west-bethel-motel-booking-system/mcp-edge}:${MCP_EDGE_TAG:-latest}
    container_name: wbm-mcp-production
    restart: unless-stopped
    env_file:
      - path: /mnt/wdblack/dev/projects/west-bethel-motel-booking-system/mcp-edge/.env.production
        required: true
    ports:
      - "3151:3151"
    volumes:
      - wbm_mcp_production_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3151/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  agent_jumbo_data:
    external: true
  agent_jumbo_logs:
    external: true
  agent_jumbo_venv:
    external: true
  wbm_mcp_staging_data:
  wbm_mcp_production_data:
