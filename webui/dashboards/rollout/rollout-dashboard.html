<html>

<head>
  <title>Portfolio Rollout</title>
  <script type="module">
    import { store } from "/dashboards/rollout/rollout-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.rolloutDashboard">
      <div class="dashboard-page rollout-dashboard" x-create="$store.rolloutDashboard.onOpen()" x-destroy="$store.rolloutDashboard.cleanup()">
        <style>
          .rollout-dashboard {
            display: flex;
            flex-direction: column;
            gap: 16px;
          }
          .rollout-summary-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
          }
          .rollout-shell {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 16px;
            min-height: 720px;
          }
          .rollout-panel {
            background: var(--panel-bg, #141b2d);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
          }
          .rollout-queue {
            overflow: auto;
            max-height: calc(100vh - 240px);
          }
          .rollout-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
          }
          .rollout-item {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
          }
          .rollout-item.active {
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.35);
          }
          .rollout-item-head,
          .workspace-head,
          .artifact-head,
          .artifact-actions,
          .approval-row,
          .workspace-grid,
          .workspace-actions,
          .run-log-row,
          .stats-grid {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
          }
          .workspace-grid {
            align-items: stretch;
          }
          .workspace-column {
            flex: 1 1 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
          }
          .tone-badge,
          .artifact-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
          }
          .tone-danger { background: rgba(239, 68, 68, 0.16); color: #fca5a5; }
          .tone-info { background: rgba(59, 130, 246, 0.16); color: #93c5fd; }
          .tone-warn { background: rgba(245, 158, 11, 0.16); color: #fcd34d; }
          .tone-success { background: rgba(34, 197, 94, 0.16); color: #86efac; }
          .tone-muted { background: rgba(148, 163, 184, 0.14); color: #cbd5e1; }
          .artifact-badge.approved { background: rgba(34, 197, 94, 0.16); color: #86efac; }
          .artifact-badge.drafted { background: rgba(59, 130, 246, 0.16); color: #93c5fd; }
          .artifact-badge.missing { background: rgba(239, 68, 68, 0.16); color: #fca5a5; }
          .rollout-artifact {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 16px;
            margin-top: 16px;
          }
          .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            margin-top: 12px;
          }
          .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
          }
          .field-full {
            grid-column: 1 / -1;
          }
          .field input,
          .field textarea {
            width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(15, 23, 42, 0.82);
            color: inherit;
            padding: 10px 12px;
          }
          .field textarea {
            min-height: 96px;
            resize: vertical;
          }
          .hint, .meta-line, .run-log-row {
            color: rgba(226, 232, 240, 0.76);
            font-size: 12px;
          }
          .artifact-errors {
            margin: 8px 0 0;
            padding-left: 18px;
            color: #fca5a5;
          }
          .workspace-actions .btn,
          .artifact-actions .btn,
          .approval-row .btn {
            margin: 0;
          }
          .btn-inline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
          }
          .execution-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
          }
          @media (max-width: 1100px) {
            .rollout-shell {
              grid-template-columns: 1fr;
            }
            .rollout-queue {
              max-height: none;
            }
          }
        </style>

        <div class="dashboard-header">
          <div class="dashboard-title-section">
            <button class="dashboard-back-btn" @click="$store.dashboardRouter?.closeDashboard()" title="Back to Chat">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
              </svg>
            </button>
            <div>
              <h1 class="dashboard-title">Portfolio Rollout</h1>
              <div class="hint" x-text="$store.rolloutDashboard.dashboard.initiative_title || 'Portfolio planning control plane'"></div>
            </div>
          </div>
          <div class="dashboard-actions">
            <select class="btn" x-model="$store.rolloutDashboard.draftProvider">
              <option value="codex">Codex</option>
              <option value="claude">Claude</option>
            </select>
            <select class="btn" x-model="$store.rolloutDashboard.selectedRuntimeScope">
              <template x-for="scope in $store.rolloutDashboard.availableRuntimeScopes()" :key="scope">
                <option :value="scope" x-text="scope"></option>
              </template>
            </select>
            <select class="btn" x-model="$store.rolloutDashboard.repoWriteMode">
              <option value="writable">Writable Planning</option>
              <option value="read_only">Read-only Planning</option>
            </select>
            <button class="btn" @click="$store.rolloutDashboard.activeView = 'queue'">Portfolio Queue</button>
            <button class="btn" @click="$store.rolloutDashboard.activeView = 'workspace'" :disabled="!$store.rolloutDashboard.selectedProductSlug">Product Workspace</button>
            <button class="btn" @click="$store.rolloutDashboard.activeView = 'execution'">Execution Readiness</button>
            <button class="btn btn-primary" @click="$store.rolloutDashboard.refreshDashboard()" :disabled="$store.rolloutDashboard.loading">Refresh</button>
          </div>
        </div>

        <div class="rollout-summary-strip">
          <div class="stat-card">
            <div class="stat-label">Products</div>
            <div class="stat-value" x-text="$store.rolloutDashboard.dashboard.summary.total_products || 0"></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Blocked</div>
            <div class="stat-value" x-text="$store.rolloutDashboard.dashboard.summary.blocked_products || 0"></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Planning Complete</div>
            <div class="stat-value" x-text="$store.rolloutDashboard.dashboard.summary.planning_complete || 0"></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Ready for Execution</div>
            <div class="stat-value" x-text="$store.rolloutDashboard.dashboard.summary.ready_for_execution || 0"></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Resolved Targets</div>
            <div class="stat-value" x-text="$store.rolloutDashboard.dashboard.summary.resolved_targets || 0"></div>
          </div>
        </div>

        <div class="dashboard-empty" x-show="$store.rolloutDashboard.error" x-text="$store.rolloutDashboard.error"></div>

        <div class="rollout-shell" x-show="$store.rolloutDashboard.activeView !== 'execution'">
          <div class="rollout-panel rollout-queue">
            <div class="workspace-head">
              <h2>Portfolio Queue</h2>
              <div class="hint">Blocked products stay visible until resolved.</div>
            </div>

            <template x-for="status in ['unmapped', 'definition_blocked', 'seeded', 'discovery', 'planning', 'approval_pending', 'ready_for_execution', 'executing', 'release_ready', 'done']" :key="status">
              <div class="rollout-list" x-show="$store.rolloutDashboard.productsByStatus(status).length">
                <div class="meta-line" x-text="status.replaceAll('_', ' ')"></div>
                <template x-for="product in $store.rolloutDashboard.productsByStatus(status)" :key="product.slug">
                  <div class="rollout-item" :class="{ active: $store.rolloutDashboard.isSelected(product.slug) }" @click="$store.rolloutDashboard.selectProduct(product.slug)">
                    <div class="rollout-item-head">
                      <strong x-text="product.name"></strong>
                      <span class="tone-badge" :class="'tone-' + $store.rolloutDashboard.statusTone(product.status)" x-text="product.status.replaceAll('_', ' ')"></span>
                    </div>
                    <div class="meta-line" x-text="product.slug"></div>
                    <div class="meta-line" x-text="product.target_path || product.blocked_reason || 'No target path set'"></div>
                    <div class="meta-line" x-text="$store.rolloutDashboard.productProgressLabel(product)"></div>
                    <div class="meta-line" x-show="product.workflow_run_id" x-text="'Run: ' + product.workflow_run_id"></div>
                    <div class="meta-line" x-show="product.planning_artifacts?.missing?.length" x-text="'Missing: ' + product.planning_artifacts.missing.join(', ')"></div>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <div class="rollout-panel" x-show="$store.rolloutDashboard.activeView === 'workspace' && $store.rolloutDashboard.workspace">
            <div class="workspace-head">
              <div>
                <h2 x-text="$store.rolloutDashboard.workspace.product.name"></h2>
                <div class="hint" x-text="$store.rolloutDashboard.workspace.product.description"></div>
              </div>
              <span class="tone-badge" :class="'tone-' + $store.rolloutDashboard.statusTone($store.rolloutDashboard.workspace.unit.status)" x-text="$store.rolloutDashboard.workspace.unit.status.replaceAll('_', ' ')"></span>
            </div>

            <div class="workspace-actions">
              <button class="btn btn-primary" @click="$store.rolloutDashboard.startPlanning()" :disabled="!$store.rolloutDashboard.canStartPlanning()">Start Planning Run</button>
              <button class="btn btn-primary" @click="$store.rolloutDashboard.startProductPlanningJob()" :disabled="$store.rolloutDashboard.saving || !$store.rolloutDashboard.canStartProductJob()">Run Full Product Plan</button>
              <button class="btn" @click="$store.rolloutDashboard.loadWorkspace()" :disabled="$store.rolloutDashboard.loading">Refresh Run Status</button>
              <button class="btn" @click="$store.rolloutDashboard.refreshProviderReadiness()" :disabled="$store.rolloutDashboard.saving">Check Provider Readiness</button>
              <button class="btn" @click="$store.rolloutDashboard.syncLinear()" :disabled="$store.rolloutDashboard.saving">Sync Linear Plan</button>
            </div>

            <div class="workspace-grid">
              <div class="workspace-column">
                <div class="rollout-panel">
                  <h3>Product Summary</h3>
                  <div class="meta-line" x-text="'Slug: ' + $store.rolloutDashboard.workspace.product.slug"></div>
                  <div class="meta-line" x-text="'Project: ' + $store.rolloutDashboard.workspace.product.project_name"></div>
                  <div class="meta-line" x-text="'Audience: ' + ($store.rolloutDashboard.workspace.product.audience || 'n/a')"></div>
                  <div class="meta-line" x-text="'Run: ' + ($store.rolloutDashboard.workspace.unit.workflow_run_id || 'not started')"></div>
                  <div class="meta-line" x-text="'Stage: ' + ($store.rolloutDashboard.workspace.run.stage_family || 'not started')"></div>
                  <div class="meta-line" x-text="'Progress: ' + $store.rolloutDashboard.workspace.progress.complete_count + '/' + $store.rolloutDashboard.workspace.progress.total + ' complete'"></div>
                  <div class="meta-line" x-text="'Approvals: ' + $store.rolloutDashboard.workspace.progress.approved_count + '/' + $store.rolloutDashboard.workspace.progress.total"></div>
                  <div class="meta-line" x-text="'Active jobs: ' + ($store.rolloutDashboard.workspace.progress.active_jobs || 0)"></div>
                  <div class="meta-line" x-text="'Current runtime: ' + $store.rolloutDashboard.currentRuntimeScope()"></div>
                  <div class="meta-line" x-text="'Selected runtime: ' + $store.rolloutDashboard.selectedRuntimeScope"></div>
                  <div class="meta-line" x-text="'Repo write mode: ' + $store.rolloutDashboard.repoWriteMode"></div>
                  <div class="meta-line" x-show="$store.rolloutDashboard.latestProductJob()" x-text="'Latest full-plan job: ' + ($store.rolloutDashboard.latestProductJob()?.status || 'n/a')"></div>
                </div>

                <div class="rollout-panel">
                  <h3>Provider Readiness</h3>
                  <div class="meta-line" x-show="!$store.rolloutDashboard.isCurrentRuntimeScope()">Planning jobs run in the current runtime only. Change runtime back to <span x-text="$store.rolloutDashboard.currentRuntimeScope()"></span> to execute.</div>
                  <template x-for="providerName in ['codex', 'claude']" :key="providerName">
                    <div style="margin-top: 12px;">
                      <div class="artifact-head">
                        <strong x-text="providerName"></strong>
                        <span class="tone-badge" :class="'tone-' + ($store.rolloutDashboard.providerReady(providerName) ? 'success' : 'warn')" x-text="$store.rolloutDashboard.providerReady(providerName) ? 'ready' : (($store.rolloutDashboard.providerReadiness(providerName)?.status || 'unknown').replaceAll('_', ' '))"></span>
                      </div>
                      <div class="meta-line" x-text="'Scope: ' + ($store.rolloutDashboard.providerReadiness(providerName)?.runtime_scope || $store.rolloutDashboard.selectedRuntimeScope)"></div>
                      <div class="meta-line" x-text="'Runtime: ' + (($store.rolloutDashboard.providerReadiness(providerName)?.runtime) || 'n/a')"></div>
                      <div class="meta-line" x-show="$store.rolloutDashboard.providerFixHint(providerName)" x-text="$store.rolloutDashboard.providerFixHint(providerName)"></div>
                    </div>
                  </template>
                </div>

                <div class="rollout-panel">
                  <h3>Repo Target Resolution</h3>
                  <div class="hint">Blocked products must be mapped here before planning can start.</div>
                  <div class="field" style="margin-top: 10px;">
                    <label>Target path</label>
                    <input type="text" x-model="$store.rolloutDashboard.targetPathInput" placeholder="/path/to/repo">
                  </div>
                  <div class="workspace-actions" style="margin-top: 12px;">
                    <button class="btn btn-primary" @click="$store.rolloutDashboard.resolveTarget()" :disabled="$store.rolloutDashboard.saving">Save Target</button>
                  </div>
                  <div class="meta-line" x-show="$store.rolloutDashboard.workspace.unit.unresolved_repos?.length" x-text="'Unresolved repos: ' + $store.rolloutDashboard.workspace.unit.unresolved_repos.join(', ')"></div>
                </div>

                <div class="rollout-panel">
                  <h3>Approvals</h3>
                  <div class="meta-line" x-text="'Bundle approved: ' + ($store.rolloutDashboard.workspace.bundle_approval.approved ? 'yes' : 'no')"></div>
                  <div class="meta-line" x-text="'Bundle stale: ' + ($store.rolloutDashboard.workspace.bundle_approval.approval_stale ? 'yes' : 'no')"></div>
                  <div class="meta-line" x-show="$store.rolloutDashboard.workspace.bundle_approval.requires_repo_diff_ack" x-text="'Repo diff acknowledgment required for jobs: ' + ($store.rolloutDashboard.workspace.bundle_approval.pending_diff_job_ids || []).join(', ')"></div>
                  <div class="field" style="margin-top: 10px;">
                    <label>Bundle approval notes</label>
                    <textarea x-model="$store.rolloutDashboard.bundleNotes" placeholder="Approval notes or change requests"></textarea>
                  </div>
                  <label class="meta-line" x-show="$store.rolloutDashboard.workspace.bundle_approval.requires_repo_diff_ack">
                    <input type="checkbox" x-model="$store.rolloutDashboard.acknowledgeRepoDiff">
                    I reviewed the repo diff evidence for this planning bundle.
                  </label>
                  <div class="workspace-actions" style="margin-top: 12px;">
                    <button class="btn btn-primary" @click="$store.rolloutDashboard.approveBundle()" :disabled="$store.rolloutDashboard.saving || !$store.rolloutDashboard.bundleCanApprove()">Approve Planning Bundle</button>
                  </div>
                </div>

                <div class="rollout-panel">
                  <h3>Linear Plan</h3>
                  <div class="field"><label>Team ID</label><input type="text" x-model="$store.rolloutDashboard.linearTeamId"></div>
                  <div class="field"><label>Project ID</label><input type="text" x-model="$store.rolloutDashboard.linearProjectId"></div>
                  <div class="field"><label>State ID</label><input type="text" x-model="$store.rolloutDashboard.linearStateId"></div>
                  <div class="field"><label>Priority</label><input type="number" x-model="$store.rolloutDashboard.linearPriority"></div>
                  <div class="meta-line" x-show="$store.rolloutDashboard.workspace.unit.linear_sync?.synced_at" x-text="'Last sync: ' + $store.rolloutDashboard.formatDate($store.rolloutDashboard.workspace.unit.linear_sync.synced_at)"></div>
                </div>
              </div>

              <div class="workspace-column">
                <template x-for="artifactName in $store.rolloutDashboard.artifactOrder" :key="artifactName">
                  <div class="rollout-artifact">
                    <div class="artifact-head">
                      <div>
                        <h3 x-text="$store.rolloutDashboard.artifactMeta(artifactName).title"></h3>
                        <div class="meta-line" x-text="'Producer: ' + ($store.rolloutDashboard.artifactMeta(artifactName).producer || 'not drafted')"></div>
                        <div class="meta-line" x-text="'Updated: ' + $store.rolloutDashboard.formatDate($store.rolloutDashboard.artifactMeta(artifactName).generated_at)"></div>
                      </div>
                      <span class="artifact-badge" :class="$store.rolloutDashboard.artifactMeta(artifactName).status" x-text="$store.rolloutDashboard.artifactMeta(artifactName).status"></span>
                    </div>

                    <div class="artifact-actions">
                      <button class="btn btn-inline" @click="$store.rolloutDashboard.draftArtifact(artifactName)" :disabled="!$store.rolloutDashboard.canDraftArtifact(artifactName)">Draft with Claude/Codex</button>
                      <button class="btn" x-show="['queued', 'running'].includes(($store.rolloutDashboard.latestJobForArtifact(artifactName)?.status || ''))" @click="$store.rolloutDashboard.cancelDraftJob($store.rolloutDashboard.latestJobForArtifact(artifactName)?.job_id)" :disabled="$store.rolloutDashboard.saving">Cancel</button>
                      <button class="btn" x-show="$store.rolloutDashboard.canRetryJob($store.rolloutDashboard.latestJobForArtifact(artifactName))" @click="$store.rolloutDashboard.rerunPlanningJob($store.rolloutDashboard.latestJobForArtifact(artifactName)?.job_id, 'codex')" :disabled="$store.rolloutDashboard.saving">Retry Codex</button>
                      <button class="btn" x-show="$store.rolloutDashboard.canRetryJob($store.rolloutDashboard.latestJobForArtifact(artifactName))" @click="$store.rolloutDashboard.rerunPlanningJob($store.rolloutDashboard.latestJobForArtifact(artifactName)?.job_id, 'claude')" :disabled="$store.rolloutDashboard.saving">Retry Claude</button>
                      <button class="btn" @click="$store.rolloutDashboard.saveArtifact(artifactName)" :disabled="$store.rolloutDashboard.saving">Save</button>
                      <button class="btn btn-primary" @click="$store.rolloutDashboard.approveArtifact(artifactName, true)" :disabled="$store.rolloutDashboard.saving || !$store.rolloutDashboard.artifactCanApprove(artifactName)">Approve</button>
                      <button class="btn" @click="$store.rolloutDashboard.approveArtifact(artifactName, false)" :disabled="$store.rolloutDashboard.saving">Request Changes</button>
                    </div>

                    <div class="approval-row" x-show="$store.rolloutDashboard.latestJobForArtifact(artifactName)">
                      <span class="tone-badge" :class="'tone-' + $store.rolloutDashboard.jobTone($store.rolloutDashboard.latestJobForArtifact(artifactName)?.status)" x-text="$store.rolloutDashboard.latestJobForArtifact(artifactName)?.status"></span>
                      <span class="meta-line" x-text="'Provider: ' + (($store.rolloutDashboard.latestJobForArtifact(artifactName)?.agent_provider) || 'n/a')"></span>
                      <span class="meta-line" x-text="'Started: ' + $store.rolloutDashboard.formatDate($store.rolloutDashboard.latestJobForArtifact(artifactName)?.started_at)"></span>
                      <span class="meta-line" x-text="'Finished: ' + $store.rolloutDashboard.formatDate($store.rolloutDashboard.latestJobForArtifact(artifactName)?.finished_at)"></span>
                    </div>
                    <div class="meta-line" x-show="$store.rolloutDashboard.latestJobForArtifact(artifactName)?.error" x-text="$store.rolloutDashboard.latestJobForArtifact(artifactName)?.error"></div>
                    <div class="meta-line" x-show="$store.rolloutDashboard.latestJobForArtifact(artifactName)?.failure_class" x-text="'Failure class: ' + $store.rolloutDashboard.latestJobForArtifact(artifactName)?.failure_class"></div>
                    <div class="meta-line" x-show="$store.rolloutDashboard.latestJobForArtifact(artifactName)?.runtime_scope" x-text="'Runtime scope: ' + $store.rolloutDashboard.latestJobForArtifact(artifactName)?.runtime_scope"></div>
                    <div class="meta-line" x-show="$store.rolloutDashboard.latestJobForArtifact(artifactName)?.repo_write_mode" x-text="'Repo write mode: ' + $store.rolloutDashboard.latestJobForArtifact(artifactName)?.repo_write_mode"></div>
                    <div class="meta-line" x-show="$store.rolloutDashboard.latestJobForArtifact(artifactName)?.repo_diff_summary?.state_changed" x-text="'Repo diff: ' + (($store.rolloutDashboard.latestJobForArtifact(artifactName)?.repo_diff_summary?.changed_files || []).join(', ') || 'changed')"></div>

                    <ul class="artifact-errors" x-show="$store.rolloutDashboard.artifactMeta(artifactName).validation_errors?.length">
                      <template x-for="error in ($store.rolloutDashboard.artifactMeta(artifactName).validation_errors || [])" :key="error">
                        <li x-text="error"></li>
                      </template>
                    </ul>

                    <div class="form-grid">
                      <template x-if="artifactName === 'inventory.json'">
                        <div class="form-grid field-full">
                          <div class="field field-full">
                            <label>Current state summary</label>
                            <textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].current_state_summary"></textarea>
                          </div>
                          <div class="field">
                            <label>Top-level entries</label>
                            <textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].top_level_entries"></textarea>
                          </div>
                          <div class="field">
                            <label>Risks</label>
                            <textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].risks"></textarea>
                          </div>
                        </div>
                      </template>

                      <template x-if="artifactName === 'research_report.json'">
                        <div class="form-grid field-full">
                          <div class="field"><label>Implemented now</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].implemented_now"></textarea></div>
                          <div class="field"><label>Gaps</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].gaps"></textarea></div>
                          <div class="field"><label>Recommended references</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].recommended_references"></textarea></div>
                        </div>
                      </template>

                      <template x-if="artifactName === 'definition_of_done.json'">
                        <div class="form-grid field-full">
                          <div class="field"><label>Functional requirements</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].functional_requirements"></textarea></div>
                          <div class="field"><label>Tests required</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].tests_required"></textarea></div>
                          <div class="field"><label>Quality gates</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].quality_gates"></textarea></div>
                          <div class="field"><label>Security requirements</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].security_requirements"></textarea></div>
                          <div class="field"><label>Observability requirements</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].observability_requirements"></textarea></div>
                          <div class="field"><label>Rollback requirements</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].rollback_requirements"></textarea></div>
                          <div class="field field-full"><label>Release evidence</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].release_evidence"></textarea></div>
                        </div>
                      </template>

                      <template x-if="artifactName === 'execution_plan.json'">
                        <div class="form-grid field-full">
                          <div class="field field-full">
                            <label>Task slices</label>
                            <textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].task_slices" placeholder="Title | owner | acceptance criterion 1, acceptance criterion 2"></textarea>
                          </div>
                          <div class="field"><label>Integrator</label><input type="text" x-model="$store.rolloutDashboard.artifactForms[artifactName].integrator"></div>
                          <div class="field"><label>Approvals required</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].approvals_required"></textarea></div>
                        </div>
                      </template>

                      <template x-if="artifactName === 'linear_plan.json'">
                        <div class="form-grid field-full">
                          <div class="field"><label>Parent issue title</label><input type="text" x-model="$store.rolloutDashboard.artifactForms[artifactName].parent_title"></div>
                          <div class="field field-full"><label>Parent description</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].parent_description"></textarea></div>
                          <div class="field field-full"><label>Child issues</label><textarea x-model="$store.rolloutDashboard.artifactForms[artifactName].child_issues" placeholder="Issue title | short description"></textarea></div>
                        </div>
                      </template>
                    </div>

                    <div class="approval-row" style="margin-top: 12px;">
                      <div class="meta-line" x-text="'Approved: ' + ($store.rolloutDashboard.artifactMeta(artifactName).approved ? 'yes' : 'no')"></div>
                      <div class="meta-line" x-text="'Approval stale: ' + ($store.rolloutDashboard.artifactMeta(artifactName).approval_stale ? 'yes' : 'no')"></div>
                    </div>
                  </div>
                </template>

                <div class="rollout-panel">
                  <h3>Run Log / Evidence</h3>
                  <template x-for="entry in ($store.rolloutDashboard.workspace.run_log || [])" :key="entry.run_id + entry.started_at">
                    <div class="run-log-row">
                      <span x-text="entry.run_id"></span>
                      <span x-text="entry.stage_family || 'n/a'"></span>
                      <span x-text="entry.status || 'n/a'"></span>
                      <span x-text="$store.rolloutDashboard.formatDate(entry.started_at)"></span>
                    </div>
                  </template>
                  <div class="meta-line" x-show="!($store.rolloutDashboard.workspace.run_log || []).length">No run history yet.</div>
                </div>

                <div class="rollout-panel">
                  <h3>Planning Jobs</h3>
                  <div class="workspace-actions" x-show="$store.rolloutDashboard.latestProductJob()">
                    <button class="btn" x-show="['queued', 'running'].includes(($store.rolloutDashboard.latestProductJob()?.status || ''))" @click="$store.rolloutDashboard.cancelPlanningJob($store.rolloutDashboard.latestProductJob()?.job_id)" :disabled="$store.rolloutDashboard.saving">Cancel Full Plan</button>
                    <button class="btn" x-show="$store.rolloutDashboard.canRetryJob($store.rolloutDashboard.latestProductJob())" @click="$store.rolloutDashboard.rerunPlanningJob($store.rolloutDashboard.latestProductJob()?.job_id, 'codex')" :disabled="$store.rolloutDashboard.saving">Retry Full Plan with Codex</button>
                    <button class="btn" x-show="$store.rolloutDashboard.canRetryJob($store.rolloutDashboard.latestProductJob())" @click="$store.rolloutDashboard.rerunPlanningJob($store.rolloutDashboard.latestProductJob()?.job_id, 'claude')" :disabled="$store.rolloutDashboard.saving">Retry Full Plan with Claude</button>
                  </div>
                  <template x-for="job in ($store.rolloutDashboard.workspace.planning_jobs || [])" :key="job.job_id">
                    <div class="run-log-row">
                      <span x-text="job.job_type === 'product' ? 'full-plan' : job.artifact_name"></span>
                      <span x-text="job.agent_provider"></span>
                      <span x-text="job.status"></span>
                      <span x-text="job.runtime_scope || ''"></span>
                      <span x-text="job.current_artifact || ''"></span>
                      <span x-text="$store.rolloutDashboard.formatDate(job.started_at)"></span>
                    </div>
                  </template>
                  <div class="meta-line" x-show="!($store.rolloutDashboard.workspace.planning_jobs || []).length">No planning jobs yet.</div>
                </div>

                <div class="rollout-panel">
                  <h3>Repo Diff Evidence</h3>
                  <template x-for="entry in $store.rolloutDashboard.diffEvidenceJobs()" :key="entry.job_id">
                    <div class="run-log-row">
                      <span x-text="entry.job_type === 'product' ? 'full-plan' : (entry.artifact_name || entry.current_artifact || 'artifact')"></span>
                      <span x-text="entry.agent_provider"></span>
                      <span x-text="entry.summary.state_changed ? ((entry.summary.changed_file_count || 0) + ' files changed') : 'no repo diff'"></span>
                      <span x-text="$store.rolloutDashboard.formatDate(entry.finished_at || entry.started_at)"></span>
                    </div>
                  </template>
                  <div class="meta-line" x-show="!$store.rolloutDashboard.diffEvidenceJobs().length">No repo diff evidence yet.</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="rollout-panel" x-show="$store.rolloutDashboard.activeView === 'execution'">
          <div class="workspace-head">
            <h2>Execution Readiness</h2>
            <div class="hint">Products with approved planning bundles and resolved targets.</div>
          </div>
          <div class="execution-list">
            <template x-for="product in ($store.rolloutDashboard.dashboard.products || []).filter((item) => item.status === 'ready_for_execution')" :key="product.slug">
              <div class="rollout-item" @click="$store.rolloutDashboard.selectProduct(product.slug)">
                <div class="rollout-item-head">
                  <strong x-text="product.name"></strong>
                  <span class="tone-badge tone-success">Execution Ready</span>
                </div>
                <div class="meta-line" x-text="product.target_path"></div>
                <div class="meta-line" x-text="$store.rolloutDashboard.productProgressLabel(product)"></div>
              </div>
            </template>
            <div class="dashboard-empty" x-show="!(($store.rolloutDashboard.dashboard.products || []).filter((item) => item.status === 'ready_for_execution').length)">
              No products are execution-ready yet.
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
</body>

</html>
