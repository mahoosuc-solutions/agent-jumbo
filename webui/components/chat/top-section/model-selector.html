<html>

<head>
    <title>Model Selector Component</title>
    <script type="module">
        import { store } from "/components/chat/top-section/model-selector-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.modelSelector">
            <div class="model-selector-container"
                 x-init="$store.modelSelector.init()"
                 @click.outside="$store.modelSelector.closePicker()">

                <!-- Current Model Button -->
                <button class="model-current-btn"
                        @click="$store.modelSelector.togglePicker()"
                        :disabled="$store.modelSelector.loading"
                        :title="'Model: ' + ($store.modelSelector.currentModel ? $store.modelSelector.currentModel.provider + '/' + $store.modelSelector.currentModel.name : 'unknown') + ' | Backend: ' + $store.modelSelector.getCurrentBackendLabel()">
                    <span class="model-provider-icon"
                          x-text="$store.modelSelector.getProviderIcon($store.modelSelector.currentModel?.provider)"></span>
                    <span class="model-name-display"
                          x-text="$store.modelSelector.getCurrentModelDisplay()"></span>
                    <span class="model-backend-badge"
                          :class="'backend-' + ($store.modelSelector.currentBackend || 'native')"
                          x-text="$store.modelSelector.getCurrentBackendLabel()"></span>
                    <span class="model-chevron" :class="{ 'open': $store.modelSelector.modelPickerOpen }">▼</span>
                </button>

                <!-- Thinking Mode Toggle -->
                <button class="thinking-toggle-btn"
                        :class="{ 'active': $store.modelSelector.thinkingEnabled }"
                        @click="$store.modelSelector.toggleThinking()"
                        title="Extended Thinking Mode - Enable deeper reasoning for complex tasks">
                    🧠
                </button>

                <!-- Model Picker Dropdown -->
                <div class="model-picker-dropdown"
                     x-show="$store.modelSelector.modelPickerOpen"
                     x-transition:enter="transition ease-out duration-200"
                     x-transition:enter-start="opacity-0 transform scale-95"
                     x-transition:enter-end="opacity-100 transform scale-100"
                     x-transition:leave="transition ease-in duration-100"
                     x-transition:leave-start="opacity-100 transform scale-100"
                     x-transition:leave-end="opacity-0 transform scale-95">

                    <!-- Header -->
                    <div class="picker-header">
                        <span class="picker-title">Select Model</span>
                        <button class="picker-close" @click="$store.modelSelector.closePicker()">✕</button>
                    </div>

                    <!-- Search -->
                    <div class="picker-search">
                        <input type="text"
                               placeholder="Search models..."
                               x-model="$store.modelSelector.searchQuery"
                               @keydown.escape="$store.modelSelector.closePicker()">
                    </div>

                    <!-- Favorites Section -->
                    <template x-if="$store.modelSelector.favorites.length > 0">
                        <div class="picker-section">
                            <div class="section-header">⭐ Favorites</div>
                            <template x-for="model in $store.modelSelector.getFavoriteModels()" :key="model.provider + '/' + model.name">
                                <div class="model-option"
                                     @click="$store.modelSelector.switchModel(model.provider, model.name)">
                                    <div class="model-option-left">
                                        <span class="model-option-icon"
                                              x-text="$store.modelSelector.getProviderIcon(model.provider)"></span>
                                        <span class="model-option-name"
                                              x-text="model.displayName || model.name"></span>
                                    </div>
                                    <div class="model-option-right">
                                        <span class="model-option-type"
                                              :class="model.isLocal ? 'type-local' : 'type-cloud'"
                                              x-text="model.isLocal ? 'Local' : 'Cloud'"></span>
                                        <span class="model-option-cost"
                                              x-text="$store.modelSelector.formatCost(model)"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Models by Provider -->
                    <div class="picker-models">
                        <template x-for="(models, provider) in $store.modelSelector.getFilteredModels()" :key="provider">
                            <div class="picker-section provider-section">
                                <div class="section-header">
                                    <span x-text="$store.modelSelector.getProviderIcon(provider)"></span>
                                    <span x-text="provider.charAt(0).toUpperCase() + provider.slice(1)"></span>
                                    <span class="model-count">(<span x-text="models.length"></span>)</span>
                                </div>
                                <template x-for="model in models" :key="model.name">
                                    <div class="model-option"
                                         :class="{ 'active': $store.modelSelector.currentModel?.provider === provider && $store.modelSelector.currentModel?.name === model.name }"
                                         @click="$store.modelSelector.switchModel(provider, model.name)">
                                        <div class="model-option-left">
                                            <button class="favorite-btn"
                                                    :class="{ 'is-favorite': $store.modelSelector.isFavorite(provider, model.name) }"
                                                    @click.stop="$store.modelSelector.toggleFavorite(provider, model.name)"
                                                    title="Toggle favorite">
                                                <span x-text="$store.modelSelector.isFavorite(provider, model.name) ? '★' : '☆'"></span>
                                            </button>
                                            <span class="model-option-name"
                                                  x-text="model.displayName || model.name"></span>
                                        </div>
                                        <div class="model-option-right">
                                            <span class="model-option-context"
                                                  x-text="$store.modelSelector.formatContext(model.contextLength)"
                                                  x-show="model.contextLength"></span>
                                            <span class="model-option-type"
                                                  :class="model.isLocal ? 'type-local' : 'type-cloud'"
                                                  x-text="model.isLocal ? 'Local' : 'Cloud'"></span>
                                            <span class="model-option-cost"
                                                  x-text="$store.modelSelector.formatCost(model)"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Empty state -->
                        <template x-if="Object.keys($store.modelSelector.getFilteredModels()).length === 0">
                            <div class="picker-empty">
                                <template x-if="$store.modelSelector.searchQuery">
                                    <span>No models match "<span x-text="$store.modelSelector.searchQuery"></span>"</span>
                                </template>
                                <template x-if="!$store.modelSelector.searchQuery">
                                    <span>No models available. Open LLM Router settings to discover models.</span>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Footer Actions -->
                    <div class="picker-footer">
                        <div class="backend-switcher">
                            <span class="backend-switcher-label">Backend</span>
                            <select class="backend-switcher-select"
                                    x-model="$store.modelSelector.currentBackend"
                                    @change="$store.modelSelector.switchBackend($event.target.value)">
                                <template x-for="backend in $store.modelSelector.backendOptions" :key="backend.value">
                                    <option :value="backend.value" x-text="backend.label"></option>
                                </template>
                            </select>
                        </div>
                        <div class="picker-footer-actions">
                            <button class="picker-action"
                                    @click="$store.modelSelector.loadModels()"
                                    :disabled="$store.modelSelector.loading">
                                🔄 Refresh
                            </button>
                            <button class="picker-action"
                                    @click="$store.modelSelector.closePicker(); window.openSettings && window.openSettings('llm-router')">
                                ⚙️ Router Settings
                            </button>
                        </div>
                    </div>

                </div>

                <!-- Error display -->
                <div class="model-error" x-show="$store.modelSelector.error" x-text="$store.modelSelector.error"></div>

            </div>
        </template>
    </div>
</body>

</html>
