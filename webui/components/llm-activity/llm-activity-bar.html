<!-- LLM Activity Bar - Live model/tool/performance indicator -->
<div class="llm-activity-bar" x-data="llmActivityBar()" x-init="init()">
    <!-- Compact view (always visible) -->
    <div class="llm-bar-compact" @click="expanded = !expanded">
        <span class="llm-status-dot" :class="'dot-' + status"></span>
        <span class="llm-model-name" x-text="modelName || 'No model'"></span>
        <span class="llm-status-text" x-text="statusText"></span>
        <template x-if="status === 'tool' && activeTool">
            <span class="llm-active-tool" x-text="activeTool"></span>
        </template>
        <span class="llm-bar-spacer"></span>
        <template x-if="lastLatency > 0">
            <span class="llm-latency" x-text="formatLatency(lastLatency)"></span>
        </template>
        <span class="llm-trust-badge" :class="'trust-' + trustLevel" x-text="'L' + trustLevel"></span>
        <span class="llm-expand-arrow" :class="{ 'arrow-open': expanded }">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </span>
    </div>
    <!-- Expanded view (toggle) -->
    <div class="llm-bar-expanded" x-show="expanded" x-transition.duration.200ms>
        <div class="llm-detail-grid">
            <div class="llm-detail-cell">
                <span class="llm-detail-label">Model</span>
                <span class="llm-detail-value">
                    <span class="llm-provider-icon" x-html="providerIcon"></span>
                    <span x-text="provider ? (provider + '/' + modelName) : (modelName || 'Unknown')"></span>
                </span>
            </div>
            <div class="llm-detail-cell">
                <span class="llm-detail-label">Status</span>
                <span class="llm-detail-value">
                    <span class="llm-status-dot dot-sm" :class="'dot-' + status"></span>
                    <span x-text="statusText"></span>
                </span>
            </div>
            <div class="llm-detail-cell">
                <span class="llm-detail-label">Last Call</span>
                <span class="llm-detail-value" x-text="lastLatency > 0 ? formatLatency(lastLatency) : '--'"></span>
            </div>
            <div class="llm-detail-cell">
                <span class="llm-detail-label">Tokens (in/out)</span>
                <span class="llm-detail-value" x-text="formatTokens()"></span>
            </div>
            <div class="llm-detail-cell" x-show="activeTool">
                <span class="llm-detail-label">Active Tool</span>
                <span class="llm-detail-value llm-tool-name" x-text="activeTool || '--'"></span>
            </div>
            <div class="llm-detail-cell">
                <span class="llm-detail-label">Trust Level</span>
                <span class="llm-detail-value">
                    <span class="llm-trust-badge lg" :class="'trust-' + trustLevel" x-text="'Level ' + trustLevel"></span>
                </span>
            </div>
            <div class="llm-detail-cell">
                <span class="llm-detail-label">Total Calls</span>
                <span class="llm-detail-value" x-text="totalCalls"></span>
            </div>
            <div class="llm-detail-cell">
                <span class="llm-detail-label">Errors</span>
                <span class="llm-detail-value" :class="{ 'llm-error-count': totalErrors > 0 }" x-text="totalErrors"></span>
            </div>
        </div>
    </div>
</div>

<script>
function llmActivityBar() {
    return {
        // State
        expanded: false,
        status: 'idle',          // idle | thinking | tool | streaming | error
        modelName: '',
        provider: '',
        activeTool: '',
        lastLatency: 0,          // ms
        tokensIn: 0,
        tokensOut: 0,
        trustLevel: 0,
        totalCalls: 0,
        totalErrors: 0,
        _pollTimer: null,

        // Computed-like
        get statusText() {
            const map = {
                idle: 'Idle',
                thinking: 'Thinking...',
                tool: 'Calling tool...',
                streaming: 'Streaming...',
                error: 'Error'
            };
            return map[this.status] || 'Idle';
        },

        get providerIcon() {
            const p = (this.provider || '').toLowerCase();
            if (p.includes('google') || p.includes('gemini')) {
                return `<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#4285F4"/><path d="M12 2v10l8.5 5" stroke="#fff" stroke-width="1.5" fill="none"/></svg>`;
            }
            if (p.includes('anthropic') || p.includes('claude')) {
                return `<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" fill="#D97757"/><path d="M8 16l4-10 4 10M9.5 13h5" stroke="#fff" stroke-width="1.5"/></svg>`;
            }
            if (p.includes('openai') || p.includes('gpt')) {
                return `<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><circle cx="12" cy="12" r="10" fill="#10A37F"/><path d="M12 6v12M6 12h12" stroke="#fff" stroke-width="1.5"/></svg>`;
            }
            if (p.includes('ollama')) {
                return `<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><circle cx="12" cy="12" r="10" fill="#1A1A2E"/><circle cx="12" cy="10" r="4" stroke="#fff" stroke-width="1.5"/><path d="M8 18c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="#fff" stroke-width="1.5"/></svg>`;
            }
            // Generic fallback
            return `<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" fill="#52525b"/><path d="M8 12h8M12 8v8" stroke="#fff" stroke-width="1.5"/></svg>`;
        },

        // Lifecycle
        init() {
            this.poll();
            this._pollTimer = setInterval(() => this.poll(), 5000);
        },

        destroy() {
            if (this._pollTimer) {
                clearInterval(this._pollTimer);
                this._pollTimer = null;
            }
        },

        // Poll /health for runtime metrics
        async poll() {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 3000);
            try {
                const resp = await fetch('/health', {
                    method: 'GET',
                    credentials: 'same-origin',
                    signal: controller.signal
                });
                if (!resp.ok) {
                    this.status = 'error';
                    return;
                }
                const data = await resp.json();
                this.applyHealthData(data);
            } catch (_e) {
                this.status = 'error';
                this.modelName = '';
                this.provider = '';
            } finally {
                clearTimeout(timeout);
            }
        },

        applyHealthData(data) {
            const rt = data.runtime_metrics || data.metrics || {};
            const llm = data.llm || data.model || rt.llm || rt.model || {};

            // Model / provider
            this.modelName = llm.model || rt.model_name || rt.model || data.model || '';
            this.provider = llm.provider || rt.provider || data.provider || '';
            this.trustLevel = llm.trust_level ?? rt.trust_level ?? data.trust_level ?? 0;

            // Status detection
            const activeStatus = llm.status || rt.status || data.status || '';
            if (activeStatus) {
                const s = activeStatus.toLowerCase();
                if (s.includes('stream')) this.status = 'streaming';
                else if (s.includes('tool')) this.status = 'tool';
                else if (s.includes('think') || s.includes('process')) this.status = 'thinking';
                else if (s.includes('error') || s.includes('fail')) this.status = 'error';
                else this.status = 'idle';
            } else {
                this.status = data.status === 'ok' || data.status === 'healthy' ? 'idle' : 'idle';
            }

            // Active tool
            this.activeTool = llm.active_tool || rt.active_tool || '';
            if (this.activeTool && this.status === 'idle') {
                this.status = 'tool';
            }

            // Counters
            const counters = rt.counters || rt;
            this.totalCalls = counters.llm_calls || counters.total_calls || rt.total_llm_calls || 0;
            this.totalErrors = counters.errors || counters.llm_errors || rt.total_errors || 0;

            // Latency
            const timers = rt.timers || rt;
            this.lastLatency = timers.last_llm_latency_ms || timers.last_latency || rt.last_latency_ms || 0;

            // Tokens
            const tokens = rt.tokens || llm.tokens || rt;
            this.tokensIn = tokens.input || tokens.tokens_in || tokens.prompt_tokens || 0;
            this.tokensOut = tokens.output || tokens.tokens_out || tokens.completion_tokens || 0;
        },

        // Formatters
        formatLatency(ms) {
            if (ms < 1000) return ms + 'ms';
            return (ms / 1000).toFixed(1) + 's';
        },

        formatTokens() {
            if (!this.tokensIn && !this.tokensOut) return '--';
            return this.formatNum(this.tokensIn) + ' / ' + this.formatNum(this.tokensOut);
        },

        formatNum(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
            return String(n);
        }
    };
}
</script>

<style>
/* ── LLM Activity Bar ── */
.llm-activity-bar {
    width: 100%;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    border-bottom: 1px solid var(--color-border, #27272a);
    background: var(--secondary-bg, #18181b);
    user-select: none;
    z-index: 10;
}

/* Compact bar */
.llm-bar-compact {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 28px;
    padding: 0 12px;
    cursor: pointer;
    transition: background 0.15s ease;
}
.llm-bar-compact:hover {
    background: var(--hover-bg, #27272a);
}

/* Status dot */
.llm-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.3s ease;
}
.llm-status-dot.dot-sm {
    width: 6px;
    height: 6px;
}

/* Dot colors */
.dot-idle {
    background: #22c55e;
}
.dot-thinking {
    background: #3b82f6;
    animation: llm-pulse 1.2s ease-in-out infinite;
}
.dot-streaming {
    background: #3b82f6;
    animation: llm-pulse 0.8s ease-in-out infinite;
}
.dot-tool {
    background: #f59e0b;
    animation: llm-pulse 1s ease-in-out infinite;
}
.dot-error {
    background: #ef4444;
}

@keyframes llm-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.75); }
}

/* Model name */
.llm-model-name {
    color: var(--text-primary, #e4e4e7);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
}

/* Status text */
.llm-status-text {
    color: var(--text-secondary, #a1a1aa);
    white-space: nowrap;
}

/* Active tool pill */
.llm-active-tool {
    background: rgba(245, 158, 11, 0.15);
    color: #f59e0b;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    white-space: nowrap;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* Spacer */
.llm-bar-spacer {
    flex: 1;
}

/* Latency */
.llm-latency {
    color: var(--text-secondary, #71717a);
    font-size: 11px;
    white-space: nowrap;
}

/* Trust badge */
.llm-trust-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(113, 113, 122, 0.2);
    color: #a1a1aa;
    white-space: nowrap;
}
.llm-trust-badge.lg {
    font-size: 11px;
    padding: 2px 8px;
}
.trust-0 { background: rgba(113, 113, 122, 0.2); color: #a1a1aa; }
.trust-1 { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
.trust-2 { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
.trust-3 { background: rgba(168, 85, 247, 0.15); color: #c084fc; }
.trust-4 { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
.trust-5 { background: rgba(239, 68, 68, 0.15); color: #f87171; }

/* Expand arrow */
.llm-expand-arrow {
    display: flex;
    align-items: center;
    color: var(--text-secondary, #71717a);
    transition: transform 0.2s ease;
}
.llm-expand-arrow.arrow-open {
    transform: rotate(180deg);
}

/* ── Expanded view ── */
.llm-bar-expanded {
    padding: 8px 12px 10px;
    border-top: 1px solid var(--color-border, #27272a);
    background: var(--tertiary-bg, #1f1f23);
}

.llm-detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px 16px;
}

.llm-detail-cell {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.llm-detail-label {
    color: var(--text-secondary, #71717a);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.llm-detail-value {
    color: var(--text-primary, #e4e4e7);
    font-size: 12px;
    display: flex;
    align-items: center;

.llm-tool-name {
    color: #f59e0b;

}

.llm-error-count {
    color: #ef4444;
    font-weight: 600;

.llm-provider-icon {
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
}

/* Responsive */

    .llm-bar-compact {
        padding: 0 8px;
        gap: 6px;
    }
    .llm-model-name {
        max-width: 100px;
    }
    .llm-status-text {
        display: none;
    }
    .llm-detail-grid {
        grid-template-columns: 1fr 1fr;
    }
}
</style>
