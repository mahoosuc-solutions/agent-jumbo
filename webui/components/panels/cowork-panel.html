<!-- Cowork Panel - Extracted from Settings for tile row -->
<div class="cowork-panel" x-data="coworkPanelData()" x-init="init()">
    <div class="panel-header">
        <h3>Cowork Mode</h3>
        <div class="panel-actions">
            <button class="btn-sm" @click="refresh()" :disabled="loading">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6M1 20v-6h6"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
                Refresh
            </button>
        </div>
    </div>

    <!-- Approval Queue -->
    <div class="approvals-section" x-show="pendingApprovals.length > 0">
        <h4>Pending Approvals (<span x-text="pendingApprovals.length"></span>)</h4>
        <div class="approvals-list">
            <template x-for="approval in pendingApprovals.slice(0, 5)" :key="approval.id">
                <div class="approval-card">
                    <div class="approval-header">
                        <span class="approval-tool" x-text="approval.tool_name"></span>
                        <span x-show="approval.source === 'trust_gate'"
                              class="risk-badge"
                              :class="'risk-' + (approval.risk || 'MEDIUM')"
                              x-text="approval.risk || 'MEDIUM'"></span>
                        <span class="approval-time" x-text="formatTime(approval.timestamp || approval.created_at)"></span>
                    </div>
                    <div class="approval-summary" x-text="truncate(approval.summary || approval.args_preview || formatArgs(approval.tool_args), 80)"></div>
                    <div class="approval-actions">
                        <button class="btn-approve" @click="approveAction(approval.id)">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
                            Approve
                        </button>
                        <button class="btn-reject" @click="rejectAction(approval.id)">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            Deny
                        </button>
                    </div>
                    <span x-show="approval.source === 'trust_gate'"
                          class="always-approve-link"
                          @click="alwaysApprove(approval.tool_name)">
                        Always approve this tool →
                    </span>
                </div>
            </template>
        </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-value" x-text="stats.pending || 0"></div>
            <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" x-text="stats.approved || 0"></div>
            <div class="stat-label">Approved</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" x-text="stats.rejected || 0"></div>
            <div class="stat-label">Rejected</div>
        </div>
    </div>

    <div class="empty-state" x-show="!loading && pendingApprovals.length === 0">
        No pending approvals. Cowork mode requires approval for certain actions.
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <button class="action-btn" @click="refresh()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 4v6h-6M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
            Refresh
        </button>
    </div>
</div>

<script>
function coworkPanelData() {
    return {
        loading: false,
        pendingApprovals: [],
        stats: {},

        async init() {
            await this.refresh();
        },

        async refresh() {
            this.loading = true;
            try {
                const token = Alpine.store('csrfStore')?.token || '';
                const resp = await fetch('/cowork_approvals_list', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': token
                    },
                    body: JSON.stringify({})
                });
                const data = await resp.json();
                const approvals = data.approvals || [];

                this.pendingApprovals = approvals.filter(a => a.status === 'pending');
                this.stats = {
                    pending: this.pendingApprovals.length,
                    approved: approvals.filter(a => a.status === 'approved').length,
                    rejected: approvals.filter(a => a.status === 'rejected').length
                };

                // Update tile badge
                Alpine.store('tileRowStore')?.updateTileBadge('cowork', this.pendingApprovals.length, 'warning');
            } catch (e) {
                console.error('Error loading approvals:', e);
            } finally {
                this.loading = false;
            }
        },

        async approveAction(id) {
            await this.updateApproval(id, 'approved');
        },

        async rejectAction(id) {
            await this.updateApproval(id, 'rejected');
        },

        async updateApproval(id, status) {
            try {
                const token = Alpine.store('csrfStore')?.token || '';
                await fetch('/cowork_approvals_update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': token
                    },
                    body: JSON.stringify({ approval_id: id, action: status === 'approved' ? 'approve' : 'deny' })
                });
                await this.refresh();
            } catch (e) {
                console.error('Error updating approval:', e);
            }
        },

        formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        },

        truncate(text, length) {
            if (!text) return '-';
            return text.length > length ? text.substring(0, length) + '...' : text;
        },

        formatArgs(args) {
            if (!args || typeof args !== 'object' || Array.isArray(args)) return '-';
            const entries = Object.entries(args).slice(0, 2);
            return entries.map(([k, v]) => `${k}: ${String(v).substring(0, 40)}`).join(', ') || '-';
        },

        async alwaysApprove(toolName) {
            try {
                const token = Alpine.store('csrfStore')?.token || '';
                // Fetch current always-allow list
                const getResp = await fetch('/settings_get', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': token },
                    body: JSON.stringify({}),
                });
                const getData = await getResp.json();
                const sections = getData?.settings?.sections || [];
                let currentList = [];
                for (const section of sections) {
                    for (const field of (section.fields || [])) {
                        if (field.id === 'trust_always_allow') {
                            currentList = Array.isArray(field.value) ? field.value : [];
                        }
                    }
                }

                if (!currentList.includes(toolName)) {
                    const updatedList = [...currentList, toolName];
                    await fetch('/settings_set', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': token },
                        body: JSON.stringify({
                            sections: [{ fields: [{ id: 'trust_always_allow', value: updatedList }] }]
                        }),
                    });
                }

                // Also approve the pending trust-gate record for this tool so the
                // agent is unblocked immediately (not just on the next invocation).
                const pending = this.pendingApprovals.find(
                    a => a.tool_name === toolName && a.source === 'trust_gate'
                );
                if (pending) {
                    await this.updateApproval(pending.id, 'approved');
                }
            } catch (e) {
                console.error('alwaysApprove failed:', e);
            }
        }
    };
}
</script>

<style>

}

    border: 1px solid var(--color-warning, #d69e2e);
    border-radius: 6px;
    padding: 10px;
}

.approval-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
}

}

</style>
