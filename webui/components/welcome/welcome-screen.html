<html>

<head>
    <script type="module">
        import { store } from "/components/welcome/welcome-store.js";
    </script>
</head>

<body>
    <div x-data x-show="$store.welcomeStore && $store.welcomeStore.isVisible">
        <template x-if="$store.welcomeStore">
            <div x-data="{
                    ...$store.welcomeStore,
                    mosSetupNeeded: false,
                    mosBannerDismissed: false,
                    async checkMosSetup() {
                        try {
                            const res = await fetch('/health_agentmesh');
                            const data = await res.json();
                            this.mosSetupNeeded = (
                                data.agentmesh_redis === 'unconfigured' &&
                                !data.aios_bridge_enabled
                            );
                        } catch (e) {
                            this.mosSetupNeeded = false;
                        }
                    }
                }"
                x-init="checkMosSetup()"
                class="welcome-container">
                <!-- Agent Jumbo Logo -->
                <div class="welcome-logo-container">
                    <img src="./public/icon.svg" alt="Agent Jumbo Logo" class="welcome-logo" />
                </div>

                <!-- Welcome Title -->
                <h1 class="welcome-title">Welcome to Agent Jumbo</h1>
                <p class="welcome-subtitle">
                    Start a new conversation or explore the features below.
                </p>

                <!-- MOS Integration Setup Banner -->
                <div class="mos-setup-banner" x-show="mosSetupNeeded && !mosBannerDismissed" x-cloak>
                    <div class="mos-setup-banner-content">
                        <span class="material-symbols-outlined mos-setup-icon">hub</span>
                        <div class="mos-setup-text">
                            <p class="mos-setup-eyebrow">Mahoosuc OS Integration</p>
                            <p class="mos-setup-message">Have a Mahoosuc OS subscription? Activate the Agent Mesh connection from your MOS workspace to unlock cross-platform workflows.</p>
                        </div>
                    </div>
                    <div class="mos-setup-actions">
                        <a href="https://mahoosuc.ai/agent-jumbo" target="_blank" rel="noopener noreferrer" class="mos-setup-cta">Set Up in Mahoosuc OS →</a>
                        <button class="mos-setup-dismiss" @click.stop="mosBannerDismissed = true">Skip for now</button>
                    </div>
                </div>

                <!-- Action Cards -->
                <div class="welcome-actions">
                    <div class="welcome-action-card" @click="executeAction('new-chat')">
                        <span class="material-symbols-outlined welcome-action-icon">add_circle</span>
                        <h3 class="welcome-action-title">New Chat</h3>
                        <p class="welcome-action-description">
                            Start a new conversation
                        </p>
                    </div>

                    <div class="welcome-action-card" @click="executeAction('projects')">
                        <span class="material-symbols-outlined welcome-action-icon">folder</span>
                        <h3 class="welcome-action-title">Projects</h3>
                        <p class="welcome-action-description">
                            Manage your projects
                        </p>
                    </div>
                    <div class="welcome-action-card" @click="executeAction('memory')">
                        <span class="material-symbols-outlined welcome-action-icon">memory</span>
                        <h3 class="welcome-action-title">Memory</h3>
                        <p class="welcome-action-description">
                            Open Memory Dashboard
                        </p>
                    </div>
                    <div class="welcome-action-card" @click="executeAction('settings')">
                        <span class="material-symbols-outlined welcome-action-icon">settings</span>
                        <h3 class="welcome-action-title">Settings</h3>
                        <p class="welcome-action-description">
                            Configure Agent Jumbo
                        </p>
                    </div>
                    <div class="welcome-action-card" @click="executeAction('website')">
                        <span class="material-symbols-outlined welcome-action-icon">language</span>
                        <h3 class="welcome-action-title">Visit Website</h3>
                        <p class="welcome-action-description">
                            Learn more about Agent Jumbo
                        </p>
                    </div>
                    <div class="welcome-action-card" @click="executeAction('github')">
                        <span class="material-symbols-outlined welcome-action-icon">code</span>
                        <h3 class="welcome-action-title">Visit GitHub</h3>
                        <p class="welcome-action-description">
                            View source code and documentation
                        </p>
                    </div>
                    <div class="welcome-action-card" @click="executeAction('setup-mos')" x-show="mosSetupNeeded" x-cloak>
                        <span class="material-symbols-outlined welcome-action-icon">hub</span>
                        <h3 class="welcome-action-title">Connect to MOS</h3>
                        <p class="welcome-action-description">
                            Activate your Mahoosuc OS integration
                        </p>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <style>
        /* Welcome Screen Styles */
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3%;
            text-align: center;
            background: var(--color-background);
            color: var(--color-text);
            min-height: 100vh;
        }

        /* Welcome container styles */
        .welcome-logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-logo {
            width: 7rem;
            height: 7rem;
        }

        /* Themes adjustments for logo */
        .light-mode .welcome-logo {
            filter: invert(0.5);
        }

        .dark-mode .welcome-logo {
            filter: invert(0.8);
        }

        .welcome-title {
            font-size: 2rem;
            font-weight: 400;
            margin: var(--spacing-xs) 0 0 0;
            color: var(--color-text);
        }

        .welcome-action-title {
            margin-bottom: 0;
        }

        .welcome-subtitle {
            font-size: 1rem;
            margin-bottom: 2rem;
            color: var(--color-secondary);
            max-width: 600px;
            line-height: 1.5;
        }

        .welcome-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
            max-width: 520px;
            width: 100%;
            margin: 1.5rem 0;
        }

        .welcome-action-card {
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 10rem;
            justify-content: center;
        }

        .welcome-action-card:hover {
            border-color: var(--color-primary);
            background: var(--color-message-bg);
        }

        .welcome-action-icon {
            font-size: 2rem;
            margin-bottom: 0;
            color: var(--color-highlight-dark);
        }

        .welcome-action-description {
            font-size: 0.8rem;
            color: var(--color-secondary);
            line-height: 1.3;
        }

        /* Light mode adjustments */
        .light-mode .welcome-title {
            color: #2d2d2d;
        }

        .light-mode .welcome-subtitle {
            color: #666;
        }

        .light-mode .welcome-action-title {
            color: #2d2d2d;
        }

        .light-mode .welcome-action-description {
            color: #666;
        }

        .light-mode .welcome-footer {
            color: #666;
        }

        /* MOS Setup Banner */
        .mos-setup-banner {
            width: 100%;
            max-width: 520px;
            margin-bottom: 1.2rem;
            background: var(--color-panel);
            border: 1px solid var(--color-highlight-dark);
            border-radius: 12px;
            padding: 1rem 1.25rem;
        }

        .mos-setup-banner-content {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .mos-setup-icon {
            font-size: 1.4rem;
            color: var(--color-highlight-dark);
            flex-shrink: 0;
            margin-top: 0.1rem;
        }

        .mos-setup-eyebrow {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--color-highlight-dark);
            margin: 0 0 0.25rem 0;
        }

        .mos-setup-message {
            font-size: 0.825rem;
            color: var(--color-secondary);
            line-height: 1.45;
            margin: 0;
        }

        .mos-setup-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-left: 2.15rem;
        }

        .mos-setup-cta {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-highlight-dark);
            text-decoration: none;
        }

        .mos-setup-cta:hover {
            text-decoration: underline;
        }

        .mos-setup-dismiss {
            font-size: 0.8rem;
            color: var(--color-secondary);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .mos-setup-dismiss:hover {
            color: var(--color-text);
        }

        [x-cloak] { display: none !important; }

        /* Responsive design */
        @media (max-width: 768px) {
            .welcome-container {
                padding: 1rem;
                padding-top: 3rem;
            }

            .welcome-logo {
                width: 5rem;
                height: 5rem;
            }

            .welcome-logo-container {
                margin-top: 2rem;
            }

            .welcome-title {
                font-size: 1.5rem;
                margin: 0 !important;
            }

            .welcome-subtitle {
                font-size: 1rem;
                margin-top: var(--spacing-xs);
                margin-bottom: 0;
            }

            .welcome-actions {
                grid-template-columns: 1fr;
                gap: 1rem;
                margin-bottom: 2rem;
            }

            .welcome-action-card {
                padding: 1.5rem;
                min-height: 120px;
            }

            .welcome-action-icon {
                font-size: 2rem;
            }

            .welcome-action-title {
                font-size: 1.1rem;
            }
        }
    </style>
</body>

</html>
