<html>

<head>
  <title>Workflow Dashboard</title>
  <script type="module">
    import { store } from "/components/settings/workflow/workflow-dashboard-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.workflowDashboardStore">
      <div class="workflow-dashboard"
           data-testid="workflow-dashboard"
           x-create="$store.workflowDashboardStore.onOpen()"
           x-destroy="$store.workflowDashboardStore.cleanup()">

        <!-- Header with view tabs -->
        <div class="workflow-header">
          <div class="workflow-tabs" data-testid="workflow-tabs">
            <button class="workflow-tab"
                    data-testid="tab-dashboard"
                    :class="{ active: $store.workflowDashboardStore.activeView === 'dashboard' }"
                    @click="$store.workflowDashboardStore.switchView('dashboard')">
              Dashboard
            </button>
            <button class="workflow-tab"
                    data-testid="tab-workflows"
                    :class="{ active: $store.workflowDashboardStore.activeView === 'workflows' }"
                    @click="$store.workflowDashboardStore.switchView('workflows')">
              Workflows
            </button>
            <button class="workflow-tab"
                    data-testid="tab-training"
                    :class="{ active: $store.workflowDashboardStore.activeView === 'training' }"
                    @click="$store.workflowDashboardStore.switchView('training')">
              Training
            </button>
            <button class="workflow-tab"
                    data-testid="tab-skills"
                    :class="{ active: $store.workflowDashboardStore.activeView === 'skills' }"
                    @click="$store.workflowDashboardStore.switchView('skills')">
              Skills
            </button>
          </div>
          <div class="workflow-actions">
            <button class="btn btn-ok"
                    data-testid="refresh-button"
                    @click="$store.workflowDashboardStore.refresh()"
                    :disabled="$store.workflowDashboardStore.loading">
              Refresh
            </button>
          </div>
        </div>

        <!-- Error display -->
        <div class="workflow-error" data-testid="workflow-error" x-show="$store.workflowDashboardStore.error"
             x-text="$store.workflowDashboardStore.error"></div>

        <!-- Loading indicator -->
        <div class="workflow-loading" data-testid="workflow-loading" x-show="$store.workflowDashboardStore.loading">
          Loading...
        </div>

        <!-- Dashboard View -->
        <div class="workflow-view" data-testid="view-dashboard" x-show="$store.workflowDashboardStore.activeView === 'dashboard'">

          <!-- Stats Cards -->
          <div class="workflow-stats" data-testid="workflow-stats">
            <div class="stat-card" data-testid="stat-workflows">
              <div class="stat-value" data-testid="stat-workflows-value" x-text="$store.workflowDashboardStore.stats.total_workflows"></div>
              <div class="stat-label">Workflows</div>
            </div>
            <div class="stat-card" data-testid="stat-executions">
              <div class="stat-value" data-testid="stat-executions-value" x-text="$store.workflowDashboardStore.stats.total_executions"></div>
              <div class="stat-label">Executions</div>
            </div>
            <div class="stat-card" data-testid="stat-skills">
              <div class="stat-value" data-testid="stat-skills-value" x-text="$store.workflowDashboardStore.stats.total_skills"></div>
              <div class="stat-label">Skills</div>
            </div>
            <div class="stat-card" data-testid="stat-learning-paths">
              <div class="stat-value" data-testid="stat-learning-paths-value" x-text="$store.workflowDashboardStore.stats.total_learning_paths"></div>
              <div class="stat-label">Learning Paths</div>
            </div>
          </div>

          <!-- Execution Status Breakdown -->
          <div class="workflow-section" data-testid="status-breakdown-section" x-show="Object.keys($store.workflowDashboardStore.stats.executions_by_status || {}).length">
            <h4>Execution Status</h4>
            <div class="status-breakdown" data-testid="status-breakdown">
              <template x-for="[status, count] in Object.entries($store.workflowDashboardStore.stats.executions_by_status || {})" :key="status">
                <div class="status-item">
                  <span class="status-badge" :class="$store.workflowDashboardStore.getStatusClass(status)" x-text="status"></span>
                  <span class="status-count" x-text="count"></span>
                </div>
              </template>
            </div>
          </div>

          <!-- Recent Executions -->
          <div class="workflow-section" data-testid="recent-executions-section">
            <h4>Recent Executions</h4>
            <div class="workflow-empty" data-testid="recent-executions-empty" x-show="!$store.workflowDashboardStore.recentExecutions.length">
              No recent executions
            </div>
            <div class="execution-list" data-testid="recent-executions-list" x-show="$store.workflowDashboardStore.recentExecutions.length">
              <template x-for="exec in $store.workflowDashboardStore.recentExecutions" :key="exec.execution_id">
                <div class="execution-item" @click="$store.workflowDashboardStore.selectExecution(exec.execution_id)">
                  <span class="execution-icon" x-text="$store.workflowDashboardStore.getStatusIcon(exec.status)"></span>
                  <span class="execution-name" x-text="exec.name || exec.workflow_name"></span>
                  <span class="execution-stage" x-text="exec.current_stage"></span>
                  <span class="execution-date" x-text="$store.workflowDashboardStore.formatDate(exec.started_at)"></span>
                </div>
              </template>
            </div>
          </div>

          <!-- Top Skills -->
          <div class="workflow-section" data-testid="top-skills-section">
            <h4>Top Skills</h4>
            <div class="workflow-empty" data-testid="top-skills-empty" x-show="!$store.workflowDashboardStore.topSkills.length">
              No skills tracked yet
            </div>
            <div class="skill-list" data-testid="top-skills-list" x-show="$store.workflowDashboardStore.topSkills.length">
              <template x-for="skill in $store.workflowDashboardStore.topSkills" :key="skill.skill_id">
                <div class="skill-item">
                  <span class="skill-name" x-text="skill.name"></span>
                  <span class="skill-stars" x-text="$store.workflowDashboardStore.getSkillStars(skill.current_level || 1)"></span>
                  <span class="skill-completions" x-text="'(' + (skill.completions || 0) + ')'"></span>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Workflows View -->
        <div class="workflow-view" data-testid="view-workflows" x-show="$store.workflowDashboardStore.activeView === 'workflows'">
          <div class="workflow-split">
            <!-- Workflow List -->
            <div class="workflow-list-panel" data-testid="workflow-list-panel">
              <h4>Workflows</h4>
              <div class="workflow-empty" data-testid="workflow-list-empty" x-show="!$store.workflowDashboardStore.workflows.length">
                No workflows defined
              </div>
              <div class="workflow-list" data-testid="workflow-list">
                <template x-for="wf in $store.workflowDashboardStore.workflows" :key="wf.workflow_id">
                  <div class="workflow-item"
                       :class="{ selected: $store.workflowDashboardStore.selectedWorkflow?.workflow_id === wf.workflow_id }"
                       @click="$store.workflowDashboardStore.selectWorkflow(wf.workflow_id)">
                    <div class="workflow-item-name" x-text="wf.name"></div>
                    <div class="workflow-item-meta">
                      <span x-text="wf.version || 'v1'"></span>
                      <span x-text="(wf.stages?.length || 0) + ' stages'"></span>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Workflow Detail -->
            <div class="workflow-detail-panel" data-testid="workflow-detail-panel" x-show="$store.workflowDashboardStore.selectedWorkflow">
              <h4 x-text="$store.workflowDashboardStore.selectedWorkflow?.name"></h4>
              <p class="workflow-description" x-text="$store.workflowDashboardStore.selectedWorkflow?.description"></p>

              <!-- Mermaid Diagram -->
              <div class="workflow-diagram" data-testid="workflow-diagram">
                <div id="workflow-mermaid-container" data-testid="mermaid-container"></div>
              </div>

              <!-- Stages -->
              <div class="workflow-stages" x-show="$store.workflowDashboardStore.selectedWorkflow?.stages">
                <h5>Stages</h5>
                <template x-for="stage in $store.workflowDashboardStore.selectedWorkflow?.stages || []" :key="stage.id">
                  <div class="stage-item">
                    <div class="stage-header">
                      <span class="stage-name" x-text="stage.name"></span>
                      <span class="stage-type" x-text="stage.type"></span>
                    </div>
                    <div class="stage-tasks" x-show="stage.tasks?.length">
                      <template x-for="task in stage.tasks" :key="task.id">
                        <div class="task-chip" x-text="task.name"></div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>

        <!-- Training View -->
        <div class="workflow-view" data-testid="view-training" x-show="$store.workflowDashboardStore.activeView === 'training'">
          <div class="workflow-split">
            <!-- Learning Paths List -->
            <div class="workflow-list-panel" data-testid="learning-paths-panel">
              <h4>Learning Paths</h4>
              <div class="workflow-empty" data-testid="learning-paths-empty" x-show="!$store.workflowDashboardStore.learningPaths.length">
                No learning paths defined
              </div>
              <div class="path-list" data-testid="learning-paths-list">
                <template x-for="path in $store.workflowDashboardStore.learningPaths" :key="path.path_id">
                  <div class="path-item"
                       :class="{ selected: $store.workflowDashboardStore.selectedPath?.path_id === path.path_id }"
                       @click="$store.workflowDashboardStore.selectPath(path.path_id)">
                    <div class="path-item-name" x-text="path.name"></div>
                    <div class="path-item-meta">
                      <span x-text="path.target_role"></span>
                      <span x-text="(path.modules?.length || 0) + ' modules'"></span>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Path Detail -->
            <div class="workflow-detail-panel" x-show="$store.workflowDashboardStore.selectedPath">
              <h4 x-text="$store.workflowDashboardStore.selectedPath?.name"></h4>
              <p class="workflow-description" x-text="$store.workflowDashboardStore.selectedPath?.description"></p>

              <!-- Progress -->
              <div class="path-progress" x-show="$store.workflowDashboardStore.pathProgress">
                <div class="progress-bar">
                  <div class="progress-fill"
                       :style="'width: ' + $store.workflowDashboardStore.getProgressPercent(
                         $store.workflowDashboardStore.pathProgress?.modules_completed?.length || 0,
                         $store.workflowDashboardStore.selectedPath?.modules?.length || 1
                       ) + '%'"></div>
                </div>
                <div class="progress-label">
                  <span x-text="($store.workflowDashboardStore.pathProgress?.modules_completed?.length || 0) + ' / ' +
                    ($store.workflowDashboardStore.selectedPath?.modules?.length || 0) + ' modules'"></span>
                </div>
              </div>

              <!-- Modules -->
              <div class="path-modules">
                <h5>Modules</h5>
                <template x-for="mod in $store.workflowDashboardStore.selectedPath?.modules || []" :key="mod.module_id">
                  <div>
                    <div class="module-item"
                         @click="$store.workflowDashboardStore.toggleModule(mod.module_id)">
                      <span class="module-icon"
                            x-text="($store.workflowDashboardStore.pathProgress?.modules_completed || []).includes(mod.module_id) ? '\u2713' : '\u25CB'"></span>
                      <span class="module-name" x-text="mod.name || mod.module_id"></span>
                      <span class="module-lessons-count" x-text="(mod.lessons?.length || 0) + ' lessons'"></span>
                      <span class="module-required" x-show="mod.required">Required</span>
                      <span class="module-expand-icon" x-text="$store.workflowDashboardStore.expandedModule === mod.module_id ? '\u25BE' : '\u25B8'"></span>
                    </div>
                    <div class="module-lessons" x-show="$store.workflowDashboardStore.expandedModule === mod.module_id">
                      <template x-for="(lesson, idx) in mod.lessons || []" :key="lesson.title">
                        <div class="lesson-item" @click.stop="$store.workflowDashboardStore.openLesson(mod, idx)">
                          <span class="lesson-number" x-text="(idx + 1)"></span>
                          <span class="lesson-title" x-text="lesson.title"></span>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Certification -->
              <div class="path-certification" x-show="$store.workflowDashboardStore.selectedPath?.certification">
                <h5>Certification</h5>
                <div class="cert-name" x-text="$store.workflowDashboardStore.selectedPath?.certification?.name"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Skills View -->
        <div class="workflow-view" data-testid="view-skills" x-show="$store.workflowDashboardStore.activeView === 'skills'">
          <div class="skills-grid" data-testid="skills-grid">
            <template x-for="[category, categorySkills] in Object.entries($store.workflowDashboardStore.skillsByCategory || {})" :key="category">
              <div class="skill-category">
                <h4 class="category-title" x-text="category.toUpperCase()"></h4>
                <div class="category-skills">
                  <template x-for="skill in categorySkills" :key="skill.skill_id">
                    <div class="skill-card" @click="$store.workflowDashboardStore.openSkill(skill.skill_id)">
                      <div class="skill-card-name" x-text="skill.name"></div>
                      <div class="skill-card-level">
                        <span class="skill-stars" x-text="$store.workflowDashboardStore.getSkillStars(skill.current_level || 1)"></span>
                      </div>
                      <div class="skill-card-meta">
                        <span x-text="'Level ' + (skill.current_level || 1)"></span>
                        <span x-text="(skill.completions || 0) + ' completions'"></span>
                      </div>
                      <div class="skill-card-progress" x-show="(skill.completions || 0) > 0 && (skill.current_level || 1) < 5">
                        <div class="skill-progress-bar">
                          <div class="skill-progress-fill" :style="'width:' + $store.workflowDashboardStore.getCardProgressPercent(skill) + '%'"></div>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>

          <div class="workflow-empty" data-testid="skills-empty" x-show="!Object.keys($store.workflowDashboardStore.skillsByCategory || {}).length">
            No skills tracked yet. Skills are registered automatically when you use the workflow training tool.
          </div>
        </div>

        <!-- Skill Detail Panel -->
        <div class="skill-detail-overlay" x-show="$store.workflowDashboardStore.selectedSkill"
             x-transition.opacity
             @click.self="$store.workflowDashboardStore.closeSkill()"
             @keydown.escape.window="$store.workflowDashboardStore.closeSkill()">
          <div class="skill-detail-panel">
            <!-- Header -->
            <div class="skill-detail-header">
              <div>
                <h3 x-text="$store.workflowDashboardStore.selectedSkill?.name"></h3>
                <span class="skill-detail-category" x-text="$store.workflowDashboardStore.selectedSkill?.category?.toUpperCase()"></span>
              </div>
              <button @click="$store.workflowDashboardStore.closeSkill()">&times;</button>
            </div>

            <!-- Description -->
            <div class="skill-detail-section">
              <p x-text="$store.workflowDashboardStore.selectedSkill?.description"></p>
            </div>

            <!-- Current Progress -->
            <div class="skill-detail-section"
                 x-data="{ get next() { return $store.workflowDashboardStore.getNextLevelRequirements($store.workflowDashboardStore.selectedSkill, $store.workflowDashboardStore.selectedSkillProgress) } }">
              <h4>Your Progress</h4>
              <div class="skill-detail-level-current">
                <span class="skill-stars-large" x-text="$store.workflowDashboardStore.getSkillStars($store.workflowDashboardStore.selectedSkillProgress?.current_level || 1)"></span>
                <span x-text="'Level ' + ($store.workflowDashboardStore.selectedSkillProgress?.current_level || 1) + ' — ' + ($store.workflowDashboardStore.selectedSkill?.proficiency_levels?.find(l => l.level === ($store.workflowDashboardStore.selectedSkillProgress?.current_level || 1))?.name || 'novice')"></span>
              </div>
              <div class="skill-detail-completions" x-text="($store.workflowDashboardStore.selectedSkillProgress?.completions || 0) + ' completions total'"></div>

              <!-- Next Level Progress Bar -->
              <template x-if="next">
                <div class="skill-next-level">
                  <div class="skill-next-label">
                    <span x-text="'Next: Level ' + next.nextLevel + ' (' + next.nextLevelName + ')'"></span>
                    <span x-text="next.completionsCurrent + ' / ' + next.completionsNeeded"></span>
                  </div>
                  <div class="skill-progress-bar-large">
                    <div class="skill-progress-fill" :style="'width:' + next.progressPercent + '%'"></div>
                  </div>
                  <div class="skill-next-criteria">
                    <template x-for="criterion in next.criteria" :key="criterion">
                      <div class="skill-criterion" x-text="criterion"></div>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="!next">
                <div class="skill-max-level">Maximum level reached</div>
              </template>
            </div>

            <!-- Proficiency Levels Roadmap -->
            <div class="skill-detail-section">
              <h4>Proficiency Roadmap</h4>
              <div class="skill-levels-roadmap">
                <template x-for="level in ($store.workflowDashboardStore.selectedSkill?.proficiency_levels || [])" :key="level.level">
                  <div class="skill-roadmap-level"
                       :class="{
                         'level-achieved': level.level <= ($store.workflowDashboardStore.selectedSkillProgress?.current_level || 1),
                         'level-next': level.level === ($store.workflowDashboardStore.selectedSkillProgress?.current_level || 1) + 1
                       }">
                    <div class="roadmap-level-header">
                      <span class="roadmap-level-num" x-text="level.level"></span>
                      <span class="roadmap-level-name" x-text="level.name"></span>
                      <span class="roadmap-level-completions" x-text="(level.min_completions || level.level * 5) + ' completions'"></span>
                    </div>
                    <div class="roadmap-level-criteria">
                      <template x-for="c in (level.criteria || [])" :key="c">
                        <span class="roadmap-criterion" x-text="c"></span>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Prerequisites -->
            <div class="skill-detail-section" x-show="($store.workflowDashboardStore.selectedSkill?.prerequisites || []).length > 0">
              <h4>Prerequisites</h4>
              <div class="skill-prereqs">
                <template x-for="prereq in $store.workflowDashboardStore.getPrerequisiteSkills($store.workflowDashboardStore.selectedSkill)" :key="prereq.skill_id">
                  <div class="skill-prereq-chip" @click="$store.workflowDashboardStore.openSkill(prereq.skill_id)">
                    <span x-text="prereq.name"></span>
                    <span class="prereq-stars" x-text="$store.workflowDashboardStore.getSkillStars(prereq.current_level || 1)"></span>
                  </div>
                </template>
              </div>
            </div>

            <!-- Related Learning Paths -->
            <div class="skill-detail-section"
                 x-data="{ get paths() { return $store.workflowDashboardStore.getRelatedPaths($store.workflowDashboardStore.selectedSkill?.skill_id) } }"
                 x-show="paths.length > 0">
              <h4>Taught In</h4>
              <div class="skill-related-paths">
                <template x-for="path in paths" :key="path.path_id">
                  <div class="skill-path-chip" @click="$store.workflowDashboardStore.closeSkill(); $store.workflowDashboardStore.activeView = 'training'; $store.workflowDashboardStore.selectPath(path.path_id);">
                    <span x-text="path.name"></span>
                    <span class="path-hours" x-text="(path.total_hours || '') + 'h'"></span>
                  </div>
                </template>
              </div>
            </div>

            <!-- Learning Resources -->
            <div class="skill-detail-section" x-show="($store.workflowDashboardStore.selectedSkill?.related_tools || []).length > 0">
              <h4>Learning Resources</h4>
              <ul class="skill-resources">
                <template x-for="resource in ($store.workflowDashboardStore.selectedSkill?.related_tools || [])" :key="resource">
                  <li x-text="resource"></li>
                </template>
              </ul>
            </div>

            <!-- Assessment History -->
            <div class="skill-detail-section"
                 x-data="{ get scores() { try { return JSON.parse($store.workflowDashboardStore.selectedSkillProgress?.assessment_scores || '[]'); } catch { return []; } } }"
                 x-show="scores.length > 0">
              <h4>Assessment History</h4>
              <div class="skill-assessments">
                <template x-for="score in scores.slice(-5).reverse()" :key="score.timestamp">
                  <div class="assessment-entry">
                    <span class="assessment-score" :class="score.score >= 70 ? 'score-pass' : 'score-fail'" x-text="score.score + '%'"></span>
                    <span class="assessment-date" x-text="$store.workflowDashboardStore.formatDate(score.timestamp)"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>

        <!-- Lesson Viewer Modal -->
        <div class="lesson-viewer-overlay" x-show="$store.workflowDashboardStore.activeLesson"
             x-transition.opacity
             @click.self="$store.workflowDashboardStore.closeLesson()"
             @keydown.escape.window="$store.workflowDashboardStore.closeLesson()">
          <div class="lesson-viewer">
            <div class="lesson-viewer-header">
              <h3 x-text="$store.workflowDashboardStore.activeLesson?.title"></h3>
              <button @click="$store.workflowDashboardStore.closeLesson()">&times;</button>
            </div>
            <div class="lesson-viewer-body" x-html="$store.workflowDashboardStore.renderLessonContent()"></div>
          </div>
        </div>

      </div>
    </template>
  </div>

  <style>
    .workflow-dashboard {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .workflow-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .workflow-tabs {
      display: flex;
      gap: 4px;
      background: var(--color-panel, #1a1a1a);
      padding: 4px;
      border-radius: 8px;
    }

    .workflow-tab {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: var(--color-text);
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .workflow-tab:hover {
      background: var(--color-border);
    }

    .workflow-tab.active {
      background: var(--color-primary);
      color: white;
    }

    .workflow-error {
      background: #3b1f1f;
      color: #f7c9c9;
      padding: 10px 12px;
      border-radius: 8px;
    }

    .workflow-loading {
      color: var(--color-text-secondary);
      font-style: italic;
      padding: 20px;
      text-align: center;
    }

    .workflow-empty {
      color: var(--color-text-secondary);
      font-style: italic;
      padding: 12px;
    }

    /* Stats Cards */
    .workflow-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--color-panel, #1a1a1a);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-primary);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      margin-top: 4px;
    }

    /* Sections */
    .workflow-section {
      background: var(--color-panel, #1a1a1a);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 16px;
    }

    .workflow-section h4 {
      margin: 0 0 12px 0;
      font-size: 1rem;
    }

    /* Status Breakdown */
    .status-breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      text-transform: uppercase;
    }

    .status-completed { background: #1b4332; color: #74c69d; }
    .status-running { background: #1a365d; color: #63b3ed; }
    .status-pending { background: #2d3748; color: #a0aec0; }
    .status-failed { background: #3b1f1f; color: #f7c9c9; }

    /* Execution List */
    .execution-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .execution-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .execution-item:hover {
      background: var(--color-border);
    }

    .execution-icon {
      width: 20px;
      text-align: center;
    }

    .execution-name {
      flex: 1;
      font-weight: 500;
    }

    .execution-stage {
      color: var(--color-text-secondary);
      font-size: 0.85rem;
    }

    .execution-date {
      color: var(--color-text-secondary);
      font-size: 0.8rem;
    }

    /* Skill List */
    .skill-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skill-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: 8px;
    }

    .skill-name {
      flex: 1;
    }

    .skill-stars {
      color: #f6e05e;
      letter-spacing: 2px;
    }

    .skill-completions {
      color: var(--color-text-secondary);
      font-size: 0.85rem;
    }

    /* Split Layout */
    .workflow-split {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      min-height: 400px;
    }

    @media (max-width: 768px) {
      .workflow-split {
        grid-template-columns: 1fr;
      }
    }

    .workflow-list-panel,
    .workflow-detail-panel {
      background: var(--color-panel, #1a1a1a);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 16px;
      overflow: auto;
    }

    .workflow-list-panel h4,
    .workflow-detail-panel h4 {
      margin: 0 0 12px 0;
    }

    /* Workflow List Items */
    .workflow-list,
    .path-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .workflow-item,
    .path-item {
      padding: 10px 12px;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .workflow-item:hover,
    .path-item:hover {
      border-color: var(--color-primary);
    }

    .workflow-item.selected,
    .path-item.selected {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }

    .workflow-item.selected .workflow-item-meta,
    .path-item.selected .path-item-meta {
      color: rgba(255,255,255,0.8);
    }

    .workflow-item-name,
    .path-item-name {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .workflow-item-meta,
    .path-item-meta {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--color-text-secondary);
    }

    /* Workflow Detail */
    .workflow-description {
      color: var(--color-text-secondary);
      margin: 0 0 16px 0;
    }

    .workflow-diagram {
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      min-height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #workflow-mermaid-container {
      width: 100%;
      overflow: auto;
    }

    #workflow-mermaid-container svg {
      max-width: 100%;
      height: auto;
    }

    /* Stages */
    .workflow-stages h5,
    .path-modules h5,
    .path-certification h5 {
      margin: 0 0 10px 0;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
    }

    .stage-item {
      padding: 10px 12px;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .stage-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .stage-name {
      font-weight: 500;
    }

    .stage-type {
      font-size: 0.8rem;
      padding: 2px 8px;
      background: var(--color-border);
      border-radius: 4px;
    }

    .stage-tasks {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .task-chip {
      font-size: 0.75rem;
      padding: 2px 8px;
      background: var(--color-panel, #1a1a1a);
      border: 1px solid var(--color-border);
      border-radius: 12px;
    }

    /* Path Progress */
    .path-progress {
      margin-bottom: 16px;
    }

    .progress-bar {
      height: 8px;
      background: var(--color-border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      background: var(--color-primary);
      border-radius: 4px;
      transition: width 0.3s;
    }

    .progress-label {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
    }

    /* Modules */
    .module-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .module-item:hover {
      border-color: var(--color-primary);
    }

    .module-icon {
      width: 20px;
      text-align: center;
    }

    .module-name {
      flex: 1;
    }

    .module-lessons-count {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
    }

    .module-expand-icon {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
    }

    .module-required {
      font-size: 0.75rem;
      padding: 2px 6px;
      background: #3b1f1f;
      color: #f7c9c9;
      border-radius: 4px;
    }

    /* Lesson list */
    .module-lessons {
      padding: 4px 0 4px 30px;
    }

    .lesson-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .lesson-item:hover {
      background: var(--color-background);
    }

    .lesson-number {
      width: 20px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--color-text-secondary);
    }

    .lesson-title {
      flex: 1;
    }

    /* Lesson viewer overlay */
    .lesson-viewer-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lesson-viewer {
      background: var(--color-panel, #1a1a1a);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .lesson-viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-panel, #1a1a1a);
      border-radius: 12px 12px 0 0;
    }

    .lesson-viewer-header h3 {
      margin: 0;
      color: var(--color-text);
    }

    .lesson-viewer-header button {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--color-text);
      line-height: 1;
      opacity: 0.7;
    }

    .lesson-viewer-header button:hover {
      opacity: 1;
    }

    .lesson-viewer-body {
      padding: 24px 28px;
      overflow-y: auto;
      flex: 1;
      line-height: 1.7;
      font-size: 0.95rem;
      color: var(--color-text);
      background: var(--color-panel, #1a1a1a);
      border-radius: 0 0 12px 12px;
    }

    .lesson-viewer-body h1,
    .lesson-viewer-body h2,
    .lesson-viewer-body h3 {
      margin: 28px 0 12px;
      color: var(--color-text);
    }

    .lesson-viewer-body h1:first-child,
    .lesson-viewer-body h2:first-child,
    .lesson-viewer-body h3:first-child {
      margin-top: 0;
    }

    .lesson-viewer-body p {
      margin: 0 0 12px;
    }

    .lesson-viewer-body ul,
    .lesson-viewer-body ol {
      padding-left: 24px;
      margin: 0 0 12px;
    }

    .lesson-viewer-body li {
      margin-bottom: 4px;
    }

    .lesson-viewer-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
    }

    .lesson-viewer-body th {
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      text-align: left;
      background: var(--color-background, #131313);
      font-weight: 600;
    }

    .lesson-viewer-body td {
      padding: 8px 12px;
      border: 1px solid var(--color-border);
      text-align: left;
    }

    .lesson-viewer-body code {
      background: var(--color-background, #131313);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--font-family-code, monospace);
      font-size: 0.9em;
    }

    .lesson-viewer-body pre {
      background: var(--color-background, #131313);
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .lesson-viewer-body pre code {
      padding: 0;
      background: none;
    }

    .lesson-viewer-body blockquote {
      border-left: 3px solid var(--color-primary);
      margin: 12px 0;
      padding: 8px 16px;
      color: var(--color-text);
      opacity: 0.85;
    }

    .lesson-viewer-body strong {
      color: var(--color-text);
      font-weight: 600;
    }

    .lesson-viewer-body hr {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: 20px 0;
    }

    /* Certification */
    .cert-name {
      padding: 10px 12px;
      background: #2d3748;
      border: 1px solid #f6e05e;
      border-radius: 8px;
      color: #f6e05e;
    }

    /* Skills Grid */
    .skills-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .skill-category {
      background: var(--color-panel, #1a1a1a);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 16px;
    }

    .category-title {
      margin: 0 0 12px 0;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
      letter-spacing: 1px;
    }

    .category-skills {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .skill-card {
      padding: 12px;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .skill-card:hover {
      border-color: var(--color-accent, #4a9eff);
      background: var(--color-panel-hover, #222);
    }

    .skill-card-name {
      font-weight: 500;
      margin-bottom: 6px;
    }

    .skill-card-level {
      margin-bottom: 6px;
    }

    .skill-card-meta {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--color-text-secondary);
    }

    /* Skill Card Progress Bar */
    .skill-card-progress { margin-top: 8px; }
    .skill-progress-bar { height: 3px; background: var(--color-border); border-radius: 2px; overflow: hidden; }
    .skill-progress-fill { height: 100%; background: var(--color-accent, #4a9eff); border-radius: 2px; transition: width 0.3s; }

    /* Skill Detail Panel */
    .skill-detail-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; justify-content: flex-end; z-index: 1000;
    }

    .skill-detail-panel {
      width: min(500px, 90vw); height: 100vh; background: var(--color-panel, #1a1a1a);
      border-left: 1px solid var(--color-border); overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .skill-detail-header {
      display: flex; justify-content: space-between; align-items: flex-start;
    }

    .skill-detail-header h3 { margin: 0; }

    .skill-detail-header button {
      background: none; border: none; color: var(--color-text);
      font-size: 1.5rem; cursor: pointer; line-height: 1; opacity: 0.7;
    }

    .skill-detail-header button:hover { opacity: 1; }

    .skill-detail-category {
      font-size: 0.75rem; color: var(--color-text-secondary); letter-spacing: 1px;
    }

    .skill-detail-section p { margin: 0; color: var(--color-text-secondary); line-height: 1.5; }

    .skill-detail-section h4 {
      margin: 0 0 8px; font-size: 0.85rem; color: var(--color-text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .skill-detail-level-current { display: flex; align-items: center; gap: 10px; }
    .skill-stars-large { font-size: 1.3rem; color: #f6e05e; letter-spacing: 2px; }
    .skill-detail-completions { font-size: 0.85rem; color: var(--color-text-secondary); margin-top: 4px; }

    /* Next Level Progress */
    .skill-next-level { margin-top: 12px; }
    .skill-next-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px; }
    .skill-progress-bar-large { height: 8px; background: var(--color-border); border-radius: 4px; overflow: hidden; }
    .skill-next-criteria { margin-top: 8px; }
    .skill-criterion { font-size: 0.8rem; color: var(--color-text-secondary); padding: 2px 0; }
    .skill-max-level { color: #48bb78; font-size: 0.9rem; margin-top: 8px; }

    /* Proficiency Roadmap */
    .skill-levels-roadmap { display: flex; flex-direction: column; gap: 8px; }

    .skill-roadmap-level {
      padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 6px;
      opacity: 0.5;
    }

    .skill-roadmap-level.level-achieved { opacity: 1; border-color: #48bb78; }
    .skill-roadmap-level.level-next { opacity: 1; border-color: var(--color-accent, #4a9eff); background: rgba(74,158,255,0.05); }
    .roadmap-level-header { display: flex; align-items: center; gap: 8px; }

    .roadmap-level-num {
      width: 24px; height: 24px; border-radius: 50%; background: var(--color-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 600;
    }

    .level-achieved .roadmap-level-num { background: #48bb78; color: #000; }
    .level-next .roadmap-level-num { background: var(--color-accent, #4a9eff); color: #000; }
    .roadmap-level-name { font-weight: 500; text-transform: capitalize; }
    .roadmap-level-completions { margin-left: auto; font-size: 0.8rem; color: var(--color-text-secondary); }
    .roadmap-level-criteria { margin-top: 4px; }
    .roadmap-criterion { font-size: 0.8rem; color: var(--color-text-secondary); display: inline-block; margin-right: 8px; }

    /* Prerequisites & Related */
    .skill-prereqs, .skill-related-paths { display: flex; flex-wrap: wrap; gap: 8px; }

    .skill-prereq-chip, .skill-path-chip {
      padding: 6px 12px; background: var(--color-background); border: 1px solid var(--color-border);
      border-radius: 6px; font-size: 0.85rem; cursor: pointer; display: flex; gap: 8px; align-items: center;
    }

    .skill-prereq-chip:hover, .skill-path-chip:hover { border-color: var(--color-accent, #4a9eff); }
    .prereq-stars { font-size: 0.7rem; color: #f6e05e; }
    .path-hours { font-size: 0.75rem; color: var(--color-text-secondary); }

    /* Learning Resources */
    .skill-resources { margin: 0; padding-left: 20px; }
    .skill-resources li { font-size: 0.85rem; padding: 2px 0; color: var(--color-text-secondary); }

    /* Assessment History */
    .skill-assessments { display: flex; flex-direction: column; gap: 6px; }
    .assessment-entry { display: flex; gap: 12px; font-size: 0.85rem; }
    .assessment-score { font-weight: 600; }
    .score-pass { color: #48bb78; }
    .score-fail { color: #fc8181; }
    .assessment-date { color: var(--color-text-secondary); }
  </style>
</body>

</html>
