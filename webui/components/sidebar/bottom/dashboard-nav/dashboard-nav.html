<html>
<head>
  <script type="module">
    // Dashboard navigation store is loaded from dashboard-router.js
  </script>
</head>
<body>
  <div x-data>
    <div class="dashboard-nav-section" x-show="$store.dashboardRouter">
        <h3 class="section-header section-header-collapsible"
            @click="$store.sidebar.toggleSection('dashboards')"
            x-effect="!$store.sidebar.isSectionOpen('dashboards') ? $el.classList.add('collapsed') : $el.classList.remove('collapsed')">
          Dashboards
          <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M8 4l8 8-8 8" />
          </svg>
        </h3>
        <div class="collapse" id="dashboards-collapse"
             x-effect="(() => { const c = bootstrap.Collapse.getOrCreateInstance($el, { toggle: false }); $store.sidebar.isSectionOpen('dashboards') ? c.show() : c.hide(); })()">
        <div class="dashboard-nav-buttons">
          <!-- Portfolio Dashboard Button -->
          <button
            class="dashboard-nav-btn"
            :class="{ 'active': $store.dashboardRouter && $store.dashboardRouter.isDashboardActive('portfolio') }"
            @click="$store.dashboardRouter && $store.dashboardRouter.showDashboard('portfolio')"
            title="Portfolio & Customers">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
              <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
            </svg>
            <span>Portfolio</span>
          </button>

          <!-- Workflows Dashboard Button -->
          <button
            class="dashboard-nav-btn"
            :class="{ 'active': $store.dashboardRouter && $store.dashboardRouter.isDashboardActive('workflows') }"
            @click="$store.dashboardRouter && $store.dashboardRouter.showDashboard('workflows')"
            title="Workflows & Training">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 2v4m0 12v4M2 12h4m12 0h4"/>
              <path d="M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
            </svg>
            <span>Workflows</span>
          </button>

          <!-- MOS Dashboard Button -->
          <button
            class="dashboard-nav-btn"
            :class="{ 'active': $store.dashboardRouter && $store.dashboardRouter.isDashboardActive('mos') }"
            @click="$store.dashboardRouter && $store.dashboardRouter.showDashboard('mos')"
            title="MOS Integration (Linear/Motion/Notion)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
            <span>MOS</span>
          </button>

          <!-- Tasks Dashboard Button -->
          <button
            class="dashboard-nav-btn"
            :class="{ 'active': $store.dashboardRouter && $store.dashboardRouter.isDashboardActive('tasks') }"
            @click="$store.dashboardRouter && $store.dashboardRouter.showDashboard('tasks')"
            title="Task Scheduler Dashboard">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            <span>Tasks</span>
          </button>

          <!-- Work Queue Dashboard Button -->
          <button
            class="dashboard-nav-btn"
            :class="{ 'active': $store.dashboardRouter && $store.dashboardRouter.isDashboardActive('workQueue') }"
            @click="$store.dashboardRouter && $store.dashboardRouter.showDashboard('workQueue')"
            title="Work Queue">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M9 7h6M9 11h6M9 15h4"/>
            </svg>
            <span>Work Queue</span>
          </button>

          <!-- Content Calendar Button -->
          <button
            class="dashboard-nav-btn"
            :class="{ 'active': $store.dashboardRouter && $store.dashboardRouter.isDashboardActive('contentCalendar') }"
            @click="$store.dashboardRouter && $store.dashboardRouter.showDashboard('contentCalendar')"
            title="Content Calendar (Marketing)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>Calendar</span>
          </button>

          <!-- Trust & Security Dashboard Button -->
          <button
            class="dashboard-nav-btn"
            :class="{ 'active': $store.dashboardRouter && $store.dashboardRouter.isDashboardActive('trust') }"
            @click="$store.dashboardRouter && $store.dashboardRouter.showDashboard('trust')"
            title="Trust & Security">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span>Trust</span>
          </button>

          <!-- Memory Stats Dashboard Button -->
          <button
            class="dashboard-nav-btn"
            :class="{ 'active': $store.dashboardRouter && $store.dashboardRouter.isDashboardActive('memory') }"
            @click="$store.dashboardRouter && $store.dashboardRouter.showDashboard('memory')"
            title="Memory Stats & Consolidation">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2a4 4 0 014 4c0 1.1-.45 2.1-1.17 2.83L12 12l-2.83-3.17A4 4 0 0112 2z"/>
              <path d="M12 12v10"/>
              <path d="M8 16h8"/>
              <path d="M6 20h12"/>
            </svg>
            <span>Memory</span>
          </button>
        </div>
        </div><!-- collapse wrapper -->
      </div>
  </div>

  <style>
    .dashboard-nav-section {
      padding: 0.6rem var(--spacing-md) 0.4rem var(--spacing-md);
      border-bottom: 1px solid var(--color-border);
    }

    .dashboard-nav-section .section-header {
      font-size: var(--font-size-small);
      color: var(--color-text);
      opacity: 0.8;
      margin: 0 0 0.5rem 0;
      font-weight: 500;
      padding: 0;
    }

    .dashboard-nav-buttons {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dashboard-nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 8px 12px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--color-text);
      opacity: 0.8;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .dashboard-nav-btn:hover {
      background: var(--color-hover);
      opacity: 1;
      border-color: var(--color-border);
    }

    .dashboard-nav-btn.active {
      background: var(--color-primary-bg, #1a365d);
      color: var(--color-primary, #4a9eff);
      opacity: 1;
      border-color: var(--color-primary, #4a9eff);
    }

    .dashboard-nav-btn svg {
      flex-shrink: 0;
    }

    .dashboard-nav-btn span {
      flex: 1;
    }
  </style>
</body>
</html>
