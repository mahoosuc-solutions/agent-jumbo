[pytest]
# Pytest configuration for PMS Hub test suite

# Test discovery
testpaths = tests
pythonpath = .
norecursedirs = docker node_modules .git
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, multiple components)
    system: System tests (end-to-end, full workflows)
    performance: Performance tests (with baselines)
    validation: Validation tests (business logic)
    asyncio: Async tests
    slow: Slow running tests
    mock: Tests using mocks
    smoke: Smoke tests (quick validation)
    e2e: End-to-end browser tests (require playwright)
    security: marks tests as security probes (hard block in CI)
    a11y: marks tests as accessibility audits (advisory in CI)

# Suppress warnings from external libraries we can't control
filterwarnings =
    ignore::DeprecationWarning:importlib._bootstrap
    ignore::FutureWarning:google.api_core
    ignore::FutureWarning:google.pubsub_v1
    ignore::ResourceWarning

# Output
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Coverage
[coverage:run]
source = instruments/custom/pms_hub,python/tools,python/api
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
precision = 2
