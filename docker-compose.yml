services:
  agent-mahoo:
    build:
      context: .
      dockerfile: DockerfileLocal
    image: agent-mahoo-local:latest
    pull_policy: never
    container_name: agent-mahoo-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AGENT_MAHOO_RUN_MODE: ${AGENT_MAHOO_RUN_MODE:-local-lite}
      AGENT_MAHOO_LAPTOP_MODE: ${AGENT_MAHOO_LAPTOP_MODE:-true}
      AGENTMESH_REDIS_URL: ""
      LITELLM_LOCAL_MODEL_COST_MAP: "True"
      WEB_UI_PORT: 80
      WEB_UI_HOST: 0.0.0.0
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      FILE_OWNER_UID: ${FILE_OWNER_UID:-1000}
      FILE_OWNER_GID: ${FILE_OWNER_GID:-1000}
    ports:
      - "${WEB_UI_PORT:-5000}:80"
    volumes:
      - .:/aj
      - agent_mahoo_data:/aj/data
      - agent_mahoo_logs:/aj/logs
      - agent_mahoo_venv:/opt/venv-a0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  agent_mahoo_data:
  agent_mahoo_logs:
  agent_mahoo_venv:
