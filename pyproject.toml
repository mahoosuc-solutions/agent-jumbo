[project.optional-dependencies]
dev = [
    "pytest>=8.4.2",
    "pytest-asyncio>=1.2.0",
    "pytest-mock>=3.15.1",
    "pytest-cov>=5.0.0",
    "pytest-timeout>=2.3.0",
    "pytest-xdist>=3.5.0",
    "jsonschema>=4.22.0",
    "ruff>=0.4.0",
    "pre-commit>=3.7.0",
    "pyright>=1.1.350",
    "bandit>=1.7.8",
    "safety>=3.0.0",
    "ipdb>=0.13.0",
    "rich>=13.0.0",
    "black>=23.0",
    "mypy>=1.0",
    "pytest-json-report>=1.5.0",
