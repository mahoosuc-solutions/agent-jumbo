[project.urls]
Homepage = "https://github.com/agent-jumbo-deploy/agent-jumbo-devops"
"Bug Tracker" = "https://github.com/agent-jumbo-deploy/agent-jumbo-devops/issues"
Documentation = "https://github.com/agent-jumbo-deploy/agent-jumbo-devops/tree/main/docs"
"Source Code" = "https://github.com/agent-jumbo-deploy/agent-jumbo-devops"
Discussions = "https://github.com/agent-jumbo-deploy/agent-jumbo-devops/discussions"

# ============================================
# Setuptools Package Discovery
# ============================================
[tool.setuptools.packages.find]
where = ["."]
include = ["python*", "instruments*"]

# ============================================
# Ruff Configuration for Agent Jumbo
# ============================================
[tool.ruff]
target-version = "py310"
line-length = 120
indent-width = 4

# Exclude common non-source directories
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "*.pyc",
    "node_modules",
    "docker",
    "logs",
    "tmp",
    "memory",
    "knowledge",
    ".devcontainer",
]

[tool.ruff.lint]
# Enable recommended rules plus some extras
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "RUF",    # Ruff-specific rules
]

ignore = [
    "E501",   # Line too long (handled by formatter)
    "E701",   # Multiple statements on one line (existing code patterns)
    "E722",   # Bare except (intentional in some error handling)
    "E741",   # Ambiguous variable name (existing patterns using l, I, O)
    "B008",   # Do not perform function calls in argument defaults
    "B015",   # Pointless comparison (existing patterns)
    "B024",   # Abstract base class without abstract methods (intentional)
    "B904",   # raise from (too many existing violations)
    "B905",   # zip() without an explicit strict= parameter
    "B023",   # Function definition does not bind loop variable (existing patterns)
    "SIM102", # Nested if statements (existing patterns)
    "SIM105", # contextlib.suppress (existing patterns)
    "SIM108", # Use ternary operator instead of if-else block
    "SIM113", # Use enumerate (existing patterns)
    "SIM115", # Use context manager for files (existing patterns)
    "SIM103", # Return condition directly (existing patterns)
    "SIM116", # Use dict instead of if/elif (existing patterns)
    "SIM117", # Single with statement (existing patterns)
    "UP007",  # Use X | Y for type annotations (keep Optional for clarity)
    "RUF001", # String contains ambiguous unicode (intentional emoji)
    "RUF002", # Docstring contains ambiguous unicode (intentional)
    "RUF003", # Comment contains ambiguous unicode (intentional dashes)
    "RUF006", # Store asyncio.create_task reference (existing patterns)
    "RUF012", # Mutable class attributes should be annotated
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
# Tests: allow sys.path manipulation, unused vars, conditional imports
"tests/*" = ["E402", "F841", "SIM105", "PLR2004", "S101", "RUF059", "B017"]
"tests/**/*.py" = ["E402", "F841", "SIM105", "PLR2004", "S101", "RUF059", "B017"]
# Extensions may have conditional imports
"**/extensions/*" = ["E402"]
# Initialization requires sys.path setup
"initialize.py" = ["E402"]
# Core files with nest_asyncio.apply() before imports
"agent.py" = ["E402"]
"run_ui.py" = ["E402"]
"preload.py" = ["E402"]
"prepare.py" = ["E402"]
# Init files can have unused imports
"__init__.py" = ["F401"]
# Scripts may have print statements and sys.path manipulation
"scripts/**/*.py" = ["T201", "E402"]
# Instruments with complex patterns
"instruments/**/*.py" = ["E402", "B007"]
# Python helpers/tools with conditional imports
"python/**/*.py" = ["E402", "B007"]

[tool.ruff.lint.isort]
known-first-party = ["python", "instruments", "agent"]
combine-as-imports = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# ============================================
# Pytest Configuration
# ============================================
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
norecursedirs = ["docker", "node_modules", ".git"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "e2e: marks tests as end-to-end tests",
    "security: marks tests as security probes (hard block in CI)",
    "performance: marks tests as performance SLA checks (soft block in CI)",
    "a11y: marks tests as accessibility audits (advisory in CI)",
]

# ============================================
# Coverage Configuration
# ============================================
[tool.coverage.run]
source = ["python", "instruments"]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/tmp/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]

# ============================================
# Pyright Configuration
# ============================================
[tool.pyright]
include = ["python", "instruments", "agent.py", "models.py"]
exclude = ["**/node_modules", "**/__pycache__", "docker", "tmp"]
pythonVersion = "3.12"
typeCheckingMode = "basic"
reportMissingImports = "warning"
reportMissingTypeStubs = false
