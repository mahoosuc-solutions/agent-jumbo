# ============================================
# Project Metadata for PyPI Publication
# ============================================
[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-jumbo-devops"
version = "1.0.0-beta"
description = "Intelligent multi-platform deployment orchestration for AI agents"
authors = [
    {name = "Mahoosuc Solutions", email = "aaron@mahoosuc.solutions"}
]
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
keywords = [
    "deployment",
    "orchestration",
    "devops",
    "kubernetes",
    "aws",
    "gcp",
    "ssh",
    "ci/cd",
    "ai-agents",
    "automation"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Installation/Setup",
    "Topic :: System :: Monitoring",
    "Topic :: System :: Networking",
]

dependencies = [
    "a2wsgi>=1.10.8",
    "aiohttp>=3.13.3",
    "aiosmtplib>=5.0.0",
    "ansio>=0.0.1",
    "anthropic>=0.76.0",
    "beautifulsoup4>=4.12.3",
    "browser-use>=0.5.11",
    "chardet<6",
    "claude-code-sdk>=0.0.25",
    "crontab>=1.0.1",
    "docker>=7.1.0",
    "duckduckgo-search>=6.1.12",
    "exchangelib>=5.4.3",
    "faiss-cpu>=1.11.0",
    "fasta2a>=0.5.0",
    "fastmcp>=3.1.1",
    "flaredantic>=0.1.4",
    "flask[async]>=3.1.3",
    "flask-basicauth>=0.2.0",
    "flask-limiter>=3.5.0",
    "GitPython>=3.1.43",
    "google-api-python-client>=2.110.0",
    "google-auth-httplib2>=0.2.0",
    "google-auth-oauthlib>=1.2.0",
    "google-cloud-pubsub>=2.18.0",
    "html2text>=2024.2.26",
    "imapclient>=3.0.1",
    "inputimeout>=1.0.4",
    "kokoro>=0.9.2",
    "kubernetes>=28.0.0",
    "langchain-community>=0.4.1",
    "langchain-core>=1.2.19",
    "langchain-unstructured>=0.1.6",
    "litellm>=1.79.3",
    "lxml-html-clean>=0.4.4",
    "markdown>=3.8.1",
    "markdownify>=1.1.0",
    "mcp>=1.13.1",
    "nest-asyncio>=1.6.0",
    "newspaper3k>=0.2.8",
    "openai>=1.99.2",
    "openai-whisper>=20240930",
    "paramiko>=3.5.0",
    "pathspec>=0.12.1",
    "pdf2image>=1.17.0",
    "playwright>=1.52.0",
    "psutil>=7.0.0",
    "pydantic>=2.11.7",
    "pymupdf>=1.25.3",
    "pypdf>=6.8.0",
    "pytesseract>=0.3.13",
    "python-dotenv>=1.1.0",
    "pytz>=2024.2",
    "pywinpty>=3.0.2; sys_platform == 'win32'",
    "sentence-transformers>=3.0.1",
    "simpleeval>=1.0.5",
    "soundfile>=0.13.1",
    "tenacity>=8.2.0",
    "tiktoken>=0.8.0",
    "unstructured[all-docs]>=0.21.5",
    "unstructured-client>=0.31.0",
    "webauthn>=2.2.0",
    "webcolors>=24.6.0",
