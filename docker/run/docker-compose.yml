services:
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - ../../ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    cpus: "12.0"
    mem_limit: 64g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "36379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent-jumbo:
    container_name: agent-jumbo
    image: agent-jumbo:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    volumes:
      - /mnt/wdblack/dev/projects/agent-jumbo:/aj      # Mount live project over /aj (app root)
      - agent_jumbo_data:/aj/data
      - agent_jumbo_venv:/opt/venv-a0                  # Persist venv across restarts
      - /mnt/wdblack:/mnt/wdblack                        # Host filesystem (projects need write access)
    ports:
      - "50080:80"
    cpus: "12.0"
    mem_limit: 64g
    env_file:
      - /mnt/wdblack/dev/secrets/agent-jumbo.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - AGENTMESH_REDIS_URL=redis://redis:6379
      - FILE_OWNER_UID=${PUID:-1000}
      - FILE_OWNER_GID=${PGID:-1000}
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy

  wireguard:
    container_name: wireguard
    image: lscr.io/linuxserver/wireguard:latest
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - /mnt/wdblack/dev/projects/agent-jumbo/wireguard:/config
      - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    network_mode: "service:agent-jumbo"
    restart: unless-stopped
    depends_on:
      - agent-jumbo
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0 latest-handshakes | awk '{if (systime()-$$2 > 180) exit 1}'"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  agent_jumbo_data:
    name: agent_jumbo_data
  redis_data:
    name: redis_data
  agent_jumbo_venv:
    name: agent_jumbo_venv
