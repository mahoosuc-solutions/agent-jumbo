services:
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - ../../ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    cpus: "12.0"
    mem_limit: 64g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  agent-jumbo:
    container_name: agent-jumbo
    image: agent-jumbo:latest
    volumes:
      - /mnt/wdblack/dev/projects/agent-jumbo:/a0     # Mount live project over /a0
      - agent_jumbo_data:/a0/data
      - /mnt/wdblack:/mnt/wdblack
    ports:
      - "50080:80"
    cpus: "12.0"
    mem_limit: 64g
    env_file:
      - ../../.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  agent_jumbo_data:
    name: agent_jumbo_data
