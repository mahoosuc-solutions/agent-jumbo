services:
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - ../../ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    cpus: "12.0"
    mem_limit: 64g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  agent-zero:
    container_name: agent-zero
    image: agent-zero-local:latest
    volumes:
      - ./agent-zero:/a0
      - agent_zero_data:/a0/data
    ports:
      - "50080:80"
    cpus: "12.0"
    mem_limit: 64g
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  agent_zero_data:
    name: agent_zero_data
