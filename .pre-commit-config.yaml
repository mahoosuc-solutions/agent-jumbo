default_language_version:
  python: python3.11

repos:
  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: "^(logs/|memory/|knowledge/|tmp/)"
      - id: end-of-file-fixer
        exclude: "^(logs/|memory/|knowledge/|tmp/)"
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key

  # Guard: nosec inside f-strings breaks SQL
  - repo: local
    hooks:
      - id: nosec-in-fstring
        name: Check nosec not inside f-strings
        language: pygrep
        entry: 'f"""\s*#\s*nosec'
        types: [python]

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-ll", "-ii", "-x", "tests/", "--skip", "B608"]
        files: ^(python|instruments)/

  # Markdown lint
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.40.0
    hooks:
      - id: markdownlint
        args: ["--fix", "--"]
        exclude: "^(logs/|docs/res/)"

  # Dependency vulnerability audit
  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        args: ["-r", "requirements.txt", "--skip-editable", "--progress-spinner=off"]

  # Check for secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: '(package-lock\.json|\.env\.example|\.secrets\.baseline)'

# CI configuration
ci:
  autofix_commit_msg: "style: auto-fix by pre-commit hooks"
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  skip: [bandit, pip-audit]  # Skip slow hooks in CI
