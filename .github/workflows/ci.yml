name: Agent Jumbo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          pip install ruff

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

  traceability:
    name: Traceability / Linear Link
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PR traceability fields
        run: |
          python3 scripts/ci/check_traceability.py --event-path "${GITHUB_EVENT_PATH}"

  schema-governance:
    name: Schema Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate checked-in schema governance bundles
        shell: bash
        run: |
          mapfile -t roots < <(find . -path '*/artifacts/data_dictionary.json' -printf '%h\n' | sort -u)
          if [ "${#roots[@]}" -eq 0 ]; then
            python3 scripts/ci/check_schema_governance.py
            exit 0
          fi
          args=()
          for root in "${roots[@]}"; do
            args+=(--artifact-root "$root")
          done
          python3 scripts/ci/check_schema_governance.py "${args[@]}"

  release-governance:
    name: Release Governance
    runs-on: ubuntu-latest
    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      LINEAR_DEFAULT_TEAM_ID: ${{ secrets.LINEAR_DEFAULT_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Enrich folder workflow evidence from CI context
        run: |
          python3 scripts/ci/update_folder_workflow_evidence.py --event-path "${GITHUB_EVENT_PATH}" --mode ci --sync-linear

      - name: Validate checked-in release governance bundles
        shell: bash
        run: |
          mapfile -t roots < <(find . -path '*/artifacts/release_bundle.json' -printf '%h\n' | sort -u)
          if [ "${#roots[@]}" -eq 0 ]; then
            python3 scripts/ci/check_release_governance.py
            exit 0
          fi
          args=()
          for root in "${roots[@]}"; do
            args+=(--artifact-root "$root")
          done
          python3 scripts/ci/check_release_governance.py "${args[@]}"

      - name: Upload folder workflow evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: folder-workflow-evidence
          path: |
            **/artifacts/*.json
            **/run_record.json
            **/run_context.json
          if-no-files-found: ignore

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [lint, traceability, schema-governance, release-governance]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip "setuptools<78" wheel
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-json-report

      - name: Run tests
        run: |
          pytest tests/ -v --ignore=docker/ -k "not e2e and not ui" --cov=python --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  test-instruments:
    name: Instrument Tests
    runs-on: ubuntu-latest
    needs: [lint, traceability, schema-governance, release-governance]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip "setuptools<78" wheel
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run instrument tests
        run: |
          pytest tests/test_workflow_*.py tests/test_virtual_team.py tests/test_customer_lifecycle.py -v

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, traceability, schema-governance, release-governance]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip "setuptools<78" wheel
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v -m integration

  performance-gate-free:
    name: Performance Gate (Free Tier)
    runs-on: ubuntu-latest
    needs: [lint, traceability, schema-governance, release-governance]
    env:
      TIER: free
      PERF_SLO_PROFILE: free
      ENABLE_PERSONA_SYSTEMS: "false"
      MAX_CONCURRENT_SESSIONS: "25"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip "setuptools<78" wheel
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Verify tier defaults
        run: |
          python - <<'PY'
          from python.helpers.settings_core import get_default_settings
          s = get_default_settings()
          assert s["deployment_tier"] == "free", s["deployment_tier"]
          assert s["perf_slo_profile"] == "free", s["perf_slo_profile"]
          assert s["enable_persona_systems"] is False, s["enable_persona_systems"]
          assert s["max_concurrent_sessions"] == 25, s["max_concurrent_sessions"]
          print("Tier defaults OK:", s["deployment_tier"], s["perf_slo_profile"], s["max_concurrent_sessions"])
          PY

      - name: Run performance marker suite
        run: |
          pytest tests -m performance -q --durations=25 || true

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip "setuptools<78" wheel
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt
          pip install pyright

      - name: Run type checker
        run: pyright --warnings
        continue-on-error: true  # Informational for now

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit security linter
        run: bandit -r python/ instruments/ -ll -ii

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Audit dependencies for vulnerabilities
        run: |
          uv export --no-hashes --frozen -o /tmp/requirements-audit.txt
          pip-audit -r /tmp/requirements-audit.txt --skip-editable --progress-spinner=off
        continue-on-error: true

  e2e-tests:
    name: E2E Tests
    runs-on: self-hosted
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install Playwright Chromium with system deps
        run: |
          uv run playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          uv run pytest tests/e2e/ -v \
            --json-report \
            --json-report-file=e2e-results.json \
            || true

      - name: Apply gate logic
        env:
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          uv run python scripts/ci/e2e_gate.py e2e-results.json \
            --labels "${PR_LABELS:-[]}"

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            e2e-results.json
            tests/e2e/screenshots/
            tests/e2e/reports/
          retention-days: 30

  docker-build:
    name: Docker Build Test
    if: false  # Disabled: docker/run dir removed, DockerfileLocal needs update
    runs-on: ubuntu-latest
    needs: [lint, test, performance-gate-free]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./DockerfileLocal
          push: false
          tags: agent-jumbo:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
