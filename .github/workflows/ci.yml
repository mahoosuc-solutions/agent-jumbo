name: Agent Jumbo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          pip install ruff

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip "setuptools<78" wheel
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: |
          pytest tests/ -v --ignore=docker/ --cov=python --cov-report=xml --cov-report=term-missing || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  test-instruments:
    name: Instrument Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip "setuptools<78" wheel
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run instrument tests
        run: |
          pytest tests/test_workflow_*.py tests/test_virtual_team.py tests/test_customer_lifecycle.py -v || true

  performance-gate-free:
    name: Performance Gate (Free Tier)
    runs-on: ubuntu-latest
    needs: lint
    env:
      TIER: free
      PERF_SLO_PROFILE: free
      ENABLE_PERSONA_SYSTEMS: "false"
      MAX_CONCURRENT_SESSIONS: "25"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip "setuptools<78" wheel
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Verify tier defaults
        run: |
          python - <<'PY'
          from python.helpers.settings_core import get_default_settings
          s = get_default_settings()
          assert s["deployment_tier"] == "free", s["deployment_tier"]
          assert s["perf_slo_profile"] == "free", s["perf_slo_profile"]
          assert s["enable_persona_systems"] is False, s["enable_persona_systems"]
          assert s["max_concurrent_sessions"] == 25, s["max_concurrent_sessions"]
          print("Tier defaults OK:", s["deployment_tier"], s["perf_slo_profile"], s["max_concurrent_sessions"])
          PY

      - name: Run performance marker suite
        run: |
          pytest tests -m performance -q --durations=25 || true

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip "setuptools<78" wheel
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r requirements.txt
          pip install pyright

      - name: Run type checker
        run: pyright --warnings
        continue-on-error: true  # Informational for now

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit security linter
        run: bandit -r python/ instruments/ -ll -ii
        continue-on-error: true

      - name: Audit dependencies for vulnerabilities
        run: pip-audit -r requirements.txt --skip-editable --progress-spinner=off
        continue-on-error: true

  docker-build:
    name: Docker Build Test
    if: false  # Disabled: docker/run dir removed, DockerfileLocal needs update
    runs-on: ubuntu-latest
    needs: [lint, test, performance-gate-free]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./DockerfileLocal
          push: false
          tags: agent-jumbo:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
