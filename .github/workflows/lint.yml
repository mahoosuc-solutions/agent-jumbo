name: Lint & Format

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: Check for nosec inside f-strings
      run: |
        if grep -rn --include='*.py' -E 'f"""[[:space:]]*#[[:space:]]*nosec' . | grep -v __pycache__; then
          echo "::error::Found # nosec comments inside f-strings. Move the comment to the execute() call line."
          exit 1
        fi

    - name: Run ruff check
      run: ruff check . --output-format=github

    - name: Run ruff format
      run: ruff format --check .

    - name: Run mypy
      run: mypy python/ --ignore-missing-imports --no-error-summary 2>/dev/null || true
