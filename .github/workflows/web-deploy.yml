name: Web Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      LINEAR_DEFAULT_TEAM_ID: ${{ secrets.LINEAR_DEFAULT_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Generate platform manifest
        run: bash scripts/build-platform-manifest.sh

      - name: Build Project Artifacts
        run: vercel build --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_GITHUB_REPO: mahoosuc-solutions/agent-jumbo
          NEXT_PUBLIC_URL: https://agent-jumbo.com
          NEXT_PUBLIC_API_URL: https://agent-jumbo.com/api

      - name: Deploy to Production
        id: deploy
        run: |
          deployment_url=$(vercel deploy --prebuilt --prod)
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "$deployment_url"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Post-deploy health check
        run: |
          echo "Waiting for deployment to propagate..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://agent-jumbo.com/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status $STATUS — retrying in 5s"
            sleep 5
          done
          echo "Health check failed after 60s — deployment may be unhealthy"
          exit 1

      - name: Record folder workflow deploy evidence
        if: always()
        run: |
          python3 scripts/ci/update_folder_workflow_evidence.py \
            --mode deploy \
            --environment production \
            --status "${{ job.status }}" \
            --deployment-system vercel \
            --workflow-file web-deploy.yml \
            --deployment-url "${{ steps.deploy.outputs.deployment_url }}"

      - name: Upload deploy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: folder-workflow-deploy-evidence
          path: |
            **/artifacts/*.json
            **/run_record.json
            **/run_context.json
          if-no-files-found: ignore

      - name: Deployment Summary
        if: always()
        run: |
          echo "Deployment workflow completed"
          echo "Deployment URL: ${{ steps.deploy.outputs.deployment_url }}"
